  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdV1ZoLzNqTDnbuuaoXxhZ-SWHb4Yr20w",
      authDomain: "portfolio-ruben-2acbd.firebaseapp.com",
      projectId: "portfolio-ruben-2acbd",
      storageBucket: "portfolio-ruben-2acbd.firebasestorage.app",
      messagingSenderId: "704584842476",
      appId: "1:704584842476:web:83c0f85a37e64d94bb79c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ── MAPA DE USUARIOS: email → nombre de documento en Firestore ──
    const USER_DOCS = {
      'rmariscal1984@gmail.com': 'ruben',
      'alvaro.cs987@gmail.com':  'alvaro'
    };

    // Devuelve el nombre del doc del usuario logueado
    const myDocName = () => USER_DOCS[window._fbUser?.email] || null;
    // Ref al doc propio (escritura)
    const myDocRef  = () => { const n = myDocName(); return n ? doc(db, 'portfolios', n) : null; };
    // Refs de TODOS los docs (lectura)
    const allDocRefs = () => Object.values(USER_DOCS).map(n => doc(db, 'portfolios', n));

    // ── AUTH ──
    window._fbSignIn = async () => {
      try { await signInWithPopup(auth, provider); }
      catch(e) { document.dispatchEvent(new CustomEvent('auth-error', { detail: e.message })); }
    };
    window._fbSignOut = async () => {
      try { await signOut(auth); } catch(e) {}
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window._fbUser = { uid: user.uid, name: user.displayName, email: user.email, photo: user.photoURL };
        window._fbReady = true;
        window._fbListenActive = false;
        document.dispatchEvent(new CustomEvent('auth-changed', { detail: { loggedIn: true } }));
      } else {
        window._fbUser = null;
        window._fbReady = false;
        document.dispatchEvent(new CustomEvent('auth-changed', { detail: { loggedIn: false } }));
      }
    });

    // ── FIRESTORE: CARTERAS ──

    // GUARDAR: solo escribe en el documento PROPIO del usuario
    window._fbSaving = false; // flag: true mientras hay un write en curso
    window._fbSave = async (data) => {
      const ref = myDocRef();
      if (!ref) { console.warn('fbSave: no hay ref (usuario no identificado)'); return; }
      try {
        window._fbSaving = true;
        await setDoc(ref, { portfolios: JSON.stringify(data) });
        window._fbStatus && window._fbStatus('ok');
      } catch(e) {
        console.error('fbSave error:', e);
        window._fbStatus && window._fbStatus('err');
      } finally {
        // Mantenemos el flag activo 2s extra para absorber el snapshot de confirmación
        setTimeout(() => { window._fbSaving = false; }, 2000);
      }
    };

    // CARGAR: lee TODOS los documentos y los combina en un array plano
    window._fbLoad = async () => {
      const combined = [];
      for (const ref of allDocRefs()) {
        try {
          const snap = await getDoc(ref);
          if (snap.exists() && snap.data().portfolios) {
            const portfolios = JSON.parse(snap.data().portfolios);
            // Marcar cada cartera con quién es su dueño (para filtrar al guardar)
            const docN = ref.id;
            portfolios.forEach(p => { p._doc = docN; });
            combined.push(...portfolios);
          }
        } catch(e) { console.warn('fbLoad error doc', ref.id, e.code); }
      }
      return combined.length > 0 ? combined : null;
    };

    // ESCUCHAR: listener en tiempo real sobre TODOS los documentos
    // Usamos el snapshot directamente (sin getDoc extra) para evitar leer datos stale
    window._fbListen = (callback) => {
      // Mantenemos una copia local del último dato conocido de cada doc
      const latestByDoc = {};

      const unsubs = allDocRefs().map(ref =>
        onSnapshot(ref,
          (snap) => {
            if (!window._fbListenActive) return;
            // Actualizar solo el doc que cambió
            if (snap.exists() && snap.data().portfolios) {
              try {
                const ps = JSON.parse(snap.data().portfolios);
                ps.forEach(p => { p._doc = ref.id; });
                latestByDoc[ref.id] = ps;
              } catch(e) { return; }
            } else {
              latestByDoc[ref.id] = [];
            }
            // Combinar todos los docs conocidos
            const combined = Object.values(latestByDoc).flat();
            if (combined.length > 0) callback(combined);
          },
          (err) => { console.warn('fbListen error', ref.id, err.code); }
        )
      );
      return () => unsubs.forEach(u => u());
    };

    // ── FIRESTORE: RETO DE AHORRO (doc compartido) ──
    const SAVINGS_DOC = doc(db, 'shared', 'savings-2026');
    const CROWD_DOC   = doc(db, 'shared', 'crowdfunding');

    window._fbSaveSavings = async (data) => {
      try {
        await setDoc(SAVINGS_DOC, { data: JSON.stringify(data), updatedAt: Date.now(), updatedBy: window._fbUser?.email }, { merge: true });
      } catch(e) { console.error('fbSaveSavings error:', e); }
    };
    window._fbLoadSavings = async () => {
      try {
        const snap = await getDoc(SAVINGS_DOC);
        if (snap.exists() && snap.data().data) return JSON.parse(snap.data().data);
        return null;
      } catch(e) { return null; }
    };
    window._fbSaveCrowd = async (data) => {
      try {
        await setDoc(CROWD_DOC, { data: JSON.stringify(data), updatedAt: Date.now() }, { merge: true });
      } catch(e) { console.error('fbSaveCrowd error:', e); }
    };
    window._fbLoadCrowd = async () => {
      try {
        const snap = await getDoc(CROWD_DOC);
        if (snap.exists() && snap.data().data) return JSON.parse(snap.data().data);
      } catch(e) {}
      return null;
    };
    window._fbListenCrowd = (callback) => {
      return onSnapshot(CROWD_DOC,
        (snap) => { if (snap.exists() && snap.data().data) { try { callback(JSON.parse(snap.data().data)); } catch(e) {} } },
        (err) => { console.warn('fbListenCrowd error', err.code); }
      );
    };

    window._fbListenSavings = (callback) => {
      return onSnapshot(SAVINGS_DOC,
        (snap) => { if (snap.exists() && window._fbListenActive) { try { callback(JSON.parse(snap.data().data)); } catch(e) {} } },
        (err) => { console.warn('fbListenSavings error:', err.code); }
      );
    };

    // ── FIRESTORE: GASTOS/INGRESOS (doc individual por usuario) ──
    const expensesDocRef = () => {
      const n = myDocName();
      return n ? doc(db, 'expenses', n) : null;
    };
    window._fbSaveExpenses = async (data) => {
      const ref = expensesDocRef();
      if (!ref) return;
      try { await setDoc(ref, { data: JSON.stringify(data), updatedAt: Date.now() }); }
      catch(e) { console.error('fbSaveExpenses error:', e); }
    };
    window._fbLoadExpenses = async () => {
      const ref = expensesDocRef();
      if (!ref) return null;
      try {
        const snap = await getDoc(ref);
        if (snap.exists() && snap.data().data) return JSON.parse(snap.data().data);
      } catch(e) {}
      return null;
    };

    window._fbListenActive = false;
    document.dispatchEvent(new Event('firebase-ready'));
  </script>

<script>
// ── STATE ──
const STORAGE_KEY  = 'portfolio-pwa-v1'; // fallback local

let _fbUnsubscribe = null;

function _fbStatus(status) {
  const el = document.getElementById('fb-status');
  if (!el) return;
  if (status === 'ok') {
    el.innerHTML = '☁️ Sincronizado';
    el.style.color = '#10b981';

    el.style.color = '#f59e0b';

    el.innerHTML = '⚠️ Sin conexión';

}
const UCOLORS = ['#00d4ff','#ff6b35','#a78bfa','#10b981','#f59e0b','#f472b6'];
const fmtPct = v => { const n=Number(v)||0; return (n>=0?'+':'')+n.toFixed(2)+'%'; };
const pctColor = v => Number(v)>=0?'#10b981':'#ef4444';

const CROWD_KEY = 'portfolio-crowd-v1';
const EXPENSES_KEY = 'portfolio-expenses-v1';
let state = {

// ── FORMATO MONEDA DINÁMICO ──
let eurUsdRate = 1;
function fmt(v) {
  const val = (v || 0) * (state.currency === 'USD' ? eurUsdRate : 1);
  return new Intl.NumberFormat('es-ES', {
    style: 'currency',
    currency: state.currency || 'EUR',
    maximumFractionDigits: val > 1000 ? 2 : val > 1 ? 4 : 6,
  }).format(val);
}

async function loadEurUsdRate() {
  // Intento 1: Twelve Data (fuente principal)
  try {
    const res = await fetch(`https://api.twelvedata.com/price?symbol=EUR/USD&apikey=${TD_KEY}`, { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    const rate = parseFloat(data?.price);
    if (rate && rate > 0) { eurUsdRate = rate; return; }
  } catch {}
  // Intento 2: Yahoo Finance via proxies
  try {
    const yfUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/EURUSD=X?interval=1m&range=1d';
    const proxies = [
      `https://corsproxy.io/?url=${encodeURIComponent(yfUrl)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`,
      `https://corsproxy.org/?${encodeURIComponent(yfUrl)}`,
    ];
    for (const url of proxies) {
      try {
        const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
        const data = await res.json();
        const rate = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
        if (rate) { eurUsdRate = rate; return; }
      } catch {}
    }
  } catch {}
  // Intento 3: frankfurter.app (BCE)
  try {
    const res = await fetch('https://api.frankfurter.app/latest?from=EUR&to=USD', { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    const rate = data?.rates?.USD;
    if (rate) { eurUsdRate = rate; return; }
  } catch {}
  // Intento 4: open.er-api
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/EUR', { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    const rate = data?.rates?.USD;
    if (rate) { eurUsdRate = rate; return; }
  } catch {}
  eurUsdRate = 1.08;
}

function toggleCurrency() {

// ── PRICE FETCHING ──

// ── Detección de tipo de identificador ──
function detectIdType(id) {
  if (!id) return 'unknown';
  const t = id.trim().toUpperCase();
  // ISIN: 2 letras + 9 alfanum + 1 dígito control = 12 chars
  if (/^[A-Z]{2}[A-Z0-9]{9}[0-9]$/.test(t)) return 'isin';
  // Crypto conocidas
  const cryptos = ['BTC','ETH','SOL','ADA','XRP','DOGE','DOT','AVAX','MATIC','LINK','UNI','LTC','BCH','ATOM','NEAR','FTM','OP','ARB','PEPE','SHIB','BNB','USDT','USDC','TON','NEAR','SUI'];
  if (cryptos.includes(t) || t.endsWith('-USD') || t.endsWith('-EUR')) return 'crypto';
  return 'ticker';
}

// ── ISIN → ticker via Yahoo Finance Search (acepta ISIN directamente) ──
const isinCache = {};
async function isinToTicker(isin) {
  if (isinCache[isin]) return isinCache[isin];
  const yfUrl = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(isin)}&lang=en-US&region=ES&quotesCount=5&newsCount=0`;
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent(yfUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`,
    `https://corsproxy.org/?${encodeURIComponent(yfUrl)}`,
    `https://thingproxy.freeboard.io/fetch/${yfUrl}`,
  ];
  for (const url of proxies) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      const quotes = data?.finance?.result?.[0]?.quotes || data?.quotes || [];
      if (!quotes.length) continue;
      // Preferimos EQUITY o ETF sobre otros tipos
      const best = quotes.find(q => ['EQUITY','ETF','MUTUALFUND'].includes(q.quoteType)) || quotes[0];
      const result = {
        ticker: best.symbol,
        yfSym: best.symbol,  // Yahoo ya devuelve el símbolo correcto con sufijo
        name: best.longname || best.shortname || best.symbol,
        type: best.quoteType,
        isin,
      };
      isinCache[isin] = result;
      return result;
    } catch {}
  }
  return null;
}

// Mapeo de exchCode OpenFIGI → sufijo Yahoo Finance (mantenido como fallback)
function buildYfSymbol(ticker, exchCode) {
  const map = {
    'GY': `${ticker}.DE`, 'NA': `${ticker}.AS`, 'FP': `${ticker}.PA`,
    'LN': `${ticker}.L`, 'SM': `${ticker}.MC`, 'SW': `${ticker}.SW`,
    'IM': `${ticker}.MI`, 'SS': `${ticker}.ST`, 'DC': `${ticker}.CO`,
    'HF': `${ticker}.HE`, 'US': ticker, 'UW': ticker, 'UN': ticker,
  };
  return map[exchCode] || ticker;
}

// ── Normaliza ticker puro (no ISIN) ──
function normalizeTicker(ticker) {
  if (!ticker) return null;
  const t = ticker.trim().toUpperCase();
  const type = detectIdType(t);
  if (type === 'crypto' && !t.includes('-')) return t + '-USD';
  return t;
}

const TD_CRYPTO_MAP = {
  'BTC-USD':'BTC/USD','ETH-USD':'ETH/USD','SOL-USD':'SOL/USD',
  'ADA-USD':'ADA/USD','XRP-USD':'XRP/USD','DOGE-USD':'DOGE/USD',
  'DOT-USD':'DOT/USD','AVAX-USD':'AVAX/USD','MATIC-USD':'MATIC/USD',
  'LINK-USD':'LINK/USD','UNI-USD':'UNI/USD','LTC-USD':'LTC/USD',
  'BNB-USD':'BNB/USD','BTC-EUR':'BTC/EUR','ETH-EUR':'ETH/EUR',
};

async function fetchTwelveData(symbol) {
  // Normalizar símbolo para Twelve Data
  const tdSym = TD_CRYPTO_MAP[symbol] || symbol;
  try {
    const url = `https://api.twelvedata.com/price?symbol=${encodeURIComponent(tdSym)}&apikey=${TD_KEY}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) return null;
    const data = await res.json();
    if (data.status === 'error' || !data.price) return null;
    const price = parseFloat(data.price);
    if (isNaN(price) || price <= 0) return null;
    // Twelve Data devuelve precio en la moneda base del par
    // Para pares /USD devuelve USD, para stocks europeos EUR
    const currency = tdSym.includes('/EUR') ? 'EUR' : tdSym.includes('/USD') ? 'USD' : 'USD';
    return { price, currency, symbol: tdSym, source: 'twelvedata' };
  } catch { return null; }
}

async function fetchYfPrice(yfSymbol) {
  // Intento 1: Twelve Data
  const td = await fetchTwelveData(yfSymbol);
  if (td) return td;
  // Intento 2: Yahoo Finance via proxies (fallback)
  const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yfSymbol)}?interval=1m&range=1d`;
  const yfUrl2 = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yfSymbol)}?interval=1m&range=1d`;
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent(yfUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`,
    `https://corsproxy.org/?${encodeURIComponent(yfUrl)}`,
    `https://thingproxy.freeboard.io/fetch/${yfUrl}`,
    `https://corsproxy.io/?url=${encodeURIComponent(yfUrl2)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl2)}`,
  ];
  for (const url of proxies) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      const meta = data?.chart?.result?.[0]?.meta;
      if (!meta) continue;
      const price = meta.regularMarketPrice || meta.previousClose;
      const currency = (meta.currency || 'USD').toUpperCase();
      return { price, currency, symbol: meta.symbol, longName: meta.longName || meta.shortName };
    } catch {}
  }
  return null;
}

// ── Fetch precio con soporte ISIN+ticker+crypto ──
async function fetchPrice(id) {
  const type = detectIdType(id?.trim().toUpperCase());

  if (type === 'isin') {
    const mapped = await isinToTicker(id.trim().toUpperCase());
    if (!mapped) return null;
    const result = await fetchYfPrice(mapped.yfSym);
    if (result) return { ...result, resolvedTicker: mapped.yfSym, resolvedName: mapped.name, assetType: mapped.type };
    return null;
  }

  // Ticker o crypto
  const sym = normalizeTicker(id);
  if (!sym) return null;
  return fetchYfPrice(sym);
}

let usdEurRate = null;
async function getUsdEurRate() {
  if (usdEurRate && (Date.now() - usdEurRate.ts) < 300000) return usdEurRate.rate;
  // Intento 1: Yahoo via proxies
  try {
    const yfUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/EURUSD=X?interval=1m&range=1d';
    const proxies = [
      `https://corsproxy.io/?url=${encodeURIComponent(yfUrl)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`,
    ];
    for (const url of proxies) {
      try {
        const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
        const data = await res.json();
        const rate = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
        if (rate) { usdEurRate = { rate: 1 / rate, ts: Date.now() }; return 1 / rate; }
      } catch {}
    }
  } catch {}
  // Intento 2: frankfurter.app
  try {
    const res = await fetch('https://api.frankfurter.app/latest?from=USD&to=EUR', { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    const rate = data?.rates?.EUR;
    if (rate) { usdEurRate = { rate, ts: Date.now() }; return rate; }
  } catch {}
  // Intento 3: open.er-api
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD', { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    const rate = data?.rates?.EUR;
    if (rate) { usdEurRate = { rate, ts: Date.now() }; return rate; }
  } catch {}
  return usdEurRate?.rate || 0.92;
}

async function toEUR(price, currency) {
  if (currency === 'EUR') return price;
  if (currency === 'GBp' || currency === 'GBX') {
    // Londres cotiza en peniques
    const gbpEur = await getExchangeRate('GBPEUR=X');
    return (price / 100) * (gbpEur || 1.17);
  }
  const rate = await getUsdEurRate();
  return price * rate;
}

async function getExchangeRate(pair) {
  const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${pair}?interval=1m&range=1d`;
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent(yfUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`,
    `https://corsproxy.org/?${encodeURIComponent(yfUrl)}`,
    `https://thingproxy.freeboard.io/fetch/${yfUrl}`,
  ];
  for (const url of proxies) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
      const data = await res.json();
      const rate = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (rate) return rate;
    } catch {}
  }
  return null;
}

async function fetchPriceEUR(id) {
  const result = await fetchPrice(id);
  if (!result) return null;
  const priceEur = await toEUR(result.price, result.currency);
  // Nombre: primero el de OpenFIGI (ISIN), si no el de Yahoo Finance
  const resolvedName = result.resolvedName || result.longName || null;
  return { price: priceEur, resolvedName, resolvedTicker: result.resolvedTicker, assetType: result.assetType };
}

// Refresca todos los activos de todas las carteras
async function refreshAllPrices(silent = false) {
  if (state.refreshing) return;
  state.refreshing = true;
  if (!silent) toast('⏳ Actualizando precios...', 'info');

  const today = new Date().toISOString().split('T')[0];
  let updated = 0, failed = 0;

  // Usamos el campo 'ticker' que puede contener ticker normal O isin
  const allIds = [...new Set(
    state.portfolios.flatMap(p => p.assets.map(a => a.ticker)).filter(Boolean)
  )];

  // Fetch en paralelo
  const prices = {};
  await Promise.all(allIds.map(async id => {
    const result = await fetchPriceEUR(id);
    if (result !== null) prices[id] = result;
    else failed++;
  }));

  state.portfolios = state.portfolios.map(p => ({
    ...p,
    assets: p.assets.map(a => {
      if (!a.ticker || prices[a.ticker] === undefined) return a;
      const result = prices[a.ticker];
      const price = typeof result === 'object' ? result.price : result;
      const hist = [...(a.history || [])];
      const last = hist[hist.length - 1];
      if (!last || last.date !== today) hist.push({ date: today, price });
      else hist[hist.length - 1] = { date: today, price };
      updated++;
      return { ...a, currentPrice: price, history: hist };
    })
  }));

  saveData();
  state.refreshing = false;
  state.lastRefresh = new Date();
  if (!silent) toast(`✅ ${updated} activos actualizados${failed > 0 ? ` (${failed} sin cotización)` : ''}`, 'ok');
  render();
}

// Auto-refresh cada N minutos
function startAutoRefresh(minutes = 5) {
  stopAutoRefresh();
  state.autoRefreshInterval = setInterval(() => refreshAllPrices(true), minutes * 60 * 1000);
}
function stopAutoRefresh() {
  if (state.autoRefreshInterval) { clearInterval(state.autoRefreshInterval); state.autoRefreshInterval = null; }
}

function calcStats(assets) {
  const invested = assets.reduce((s,a)=>s+a.quantity*a.buyPrice,0);
  const current = assets.reduce((s,a)=>s+a.quantity*a.currentPrice,0);
  const profit = current-invested;
  const pct = invested>0?(profit/invested)*100:0;
  return {invested,current,profit,pct};
}

// ── STORAGE ──
async function loadData() {
  const doStart = async () => {
    let loaded = false;

    // 1. Cargar desde Firebase
    try {
      const data = await window._fbLoad();
      if (data && Array.isArray(data) && data.length > 0) {
        state.portfolios = data;
        state.activeId = data[0]?.id || null;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        loaded = true;
        const totalAssets = data.reduce((s,p)=>s+(p.assets||[]).length,0);
        console.log('Firebase cargado:', data.length, 'carteras,', totalAssets, 'activos');
      } else {
        console.warn('Firebase vacío — usando localStorage');
      }
    } catch(e) {
      console.error('Error Firebase:', e.message);
    }

    // 2. Fallback a localStorage solo si Firebase no devolvió datos
    if (!loaded) {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && Array.isArray(parsed) && parsed.length > 0) {
            state.portfolios = parsed;
            state.activeId = state.portfolios[0]?.id || null;
            loaded = true;
            console.log('localStorage fallback:', parsed.length, 'carteras');
          }
        }
      } catch {}
    }

    if (!loaded) {
      state.portfolios = [];
      state.activeId = null;
      console.warn('Sin datos en Firebase ni localStorage');
    }

    // Marcar datos como cargados — a partir de aqui saveData puede escribir
    state.dataLoaded = true;
    state.loading = false;
    render();
    loadEurUsdRate();
    startAutoRefresh(5);
    setTimeout(() => { if (state.dataLoaded) refreshAllPrices(true); }, 6000);
    startAlarmPolling();

    // Refresca precios al volver a la app (crítico para iOS Safari)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && state.dataLoaded) {
        refreshAllPrices(true);
      }
    });

    // Cargar datos de ahorro compartidos
    await loadSavingsData();
    if (state.view === 'savings') renderSavings();

    // Cargar datos crowdfunding
    await loadCrowdData();
    if (state.view === 'crowd') renderCrowd();

    // Cargar datos gastos/ingresos
    await loadExpensesData();
    if (state.view === 'expenses') renderExpenses();

    // Listener tiempo real — se activa DESPUÉS de la carga inicial
    // para evitar que el primer snapshot de Firestore sobreescriba los datos cargados
    if (!_fbUnsubscribe) {
      // Pequeño delay para asegurar que la carga inicial está completa
      setTimeout(() => {
        window._fbListenActive = true;
        _fbUnsubscribe = window._fbListen((remoteData) => {
          if (!remoteData || !Array.isArray(remoteData) || remoteData.length === 0) {
            console.warn('Listener: remoto vacío, ignorado');
            return;
          }
          // Si hay un write propio en curso, ignorar el snapshot — es el eco de nuestro save
          if (window._fbSaving) {
            console.log('Listener: ignorado (save en curso)');
            return;
          }
          if (JSON.stringify(remoteData) !== JSON.stringify(state.portfolios)) {
            const USER_DOCS = { 'rmariscal1984@gmail.com':'ruben', 'alvaro.cs987@gmail.com':'alvaro' };
            const myDoc = USER_DOCS[window._fbUser?.email];
            // Merge inteligente: para carteras propias, quedarse con la versión
            // que tenga MÁS activos (la más reciente), nunca perder activos locales
            const myLocal  = state.portfolios.filter(p => !p._doc || p._doc === myDoc);
            const myRemote = remoteData.filter(p => !p._doc || p._doc === myDoc);
            const otherRemote = remoteData.filter(p => p._doc && p._doc !== myDoc);
            // Por cada cartera propia, usar la versión con más activos
            const myMerged = myRemote.map(rp => {
              const lp = myLocal.find(l => l.id === rp.id);
              if (!lp) return rp;
              // Quedarse con la que tenga más activos, o la local si igual
              return lp.assets.length >= rp.assets.length ? lp : rp;
            });
            // Añadir carteras locales que aún no están en remote (recién creadas)
            myLocal.forEach(lp => {
              if (!myMerged.find(m => m.id === lp.id)) myMerged.push(lp);
            });
            const merged = [...myMerged, ...otherRemote];
            state.portfolios = merged;
            state.activeId = state.activeId || merged[0]?.id || null;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
            render();
            console.log('Listener: merge', myMerged.length, 'propias +', otherRemote.length, 'ajenas');
          }
        });
      }, 2000); // 2s de margen tras la carga inicial
    }

    // Listener crowdfunding
    if (window._fbListenCrowd && !window._crowdUnsubscribe) {
      window._crowdUnsubscribe = window._fbListenCrowd((remoteData) => {
        if (remoteData && JSON.stringify(remoteData) !== JSON.stringify(state.crowdData)) {
          state.crowdData = remoteData;
          localStorage.setItem(CROWD_KEY, JSON.stringify(remoteData));
          if (state.view === 'crowd') renderCrowd();
        }
      });
    }

    // Listener reto de ahorro
    if (window._fbListenSavings && !window._savingsUnsubscribe) {
      window._savingsUnsubscribe = window._fbListenSavings((remoteData) => {
        if (remoteData && JSON.stringify(remoteData) !== JSON.stringify(state.savingsData)) {
          state.savingsData = remoteData;
          localStorage.setItem('portfolio-savings-v1', JSON.stringify(remoteData));
          if (state.view === 'savings') renderSavings();
          else toast('💰 Reto actualizado', 'info');
        }
      });
    }
  };

  // Escucha cambios de autenticación
  const ALLOWED_EMAILS = ['rmariscal1984@gmail.com', 'alvaro.cs987@gmail.com'];

  document.addEventListener('auth-changed', async (e) => {
    if (e.detail.loggedIn) {
      // Verificar lista blanca de emails
      const email = window._fbUser?.email;
      if (!ALLOWED_EMAILS.includes(email)) {
        await window._fbSignOut();
        renderLogin('⛔ Acceso denegado. Esta app es privada.');
        return;
      }
      state.loading = true;
      render();
      await doStart();
    } else {
      // Desconectado — mostrar pantalla de login
      if (_fbUnsubscribe) { _fbUnsubscribe(); _fbUnsubscribe = null; }
      if (window._savingsUnsubscribe) { window._savingsUnsubscribe(); window._savingsUnsubscribe = null; }
      if (window._crowdUnsubscribe)  { window._crowdUnsubscribe();  window._crowdUnsubscribe  = null; }
      state.crowdData = {};
      if (window._alarmInterval) { clearInterval(window._alarmInterval); window._alarmInterval = null; }
      window._fbListenActive = false;
      state.portfolios = [];
      state.activeId = null;
      state.loading = false;
      state.dataLoaded = false;  // reset para el proximo login
      renderLogin();
    }
  });

  document.addEventListener('auth-error', (e) => {
    renderLogin();
    toast('Error al iniciar sesión: ' + e.detail, 'err');
  });

  // Estado inicial: mostrar login si no hay usuario
  // auth-changed se dispara automáticamente al cargar
  renderLogin();
}

function saveData() {
  if (!state.dataLoaded) {
    console.warn('saveData BLOQUEADO — dataLoaded=false');
    return;
  }
  // No bloqueamos si portfolios está vacío — el usuario puede haber borrado todo

  // Guardar en localStorage el estado completo (con carteras de todos)
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.portfolios)); } catch {}

  if (window._fbReady) {
    _fbStatus('saving');
    // En Firebase solo guardar las carteras PROPIAS del usuario actual
    // Las de otros usuarios no se tocan — cada uno escribe solo en su doc
    const USER_DOCS = { 'rmariscal1984@gmail.com':'ruben', 'alvaro.cs987@gmail.com':'alvaro' };
    const myDoc = USER_DOCS[window._fbUser?.email];
    const myPortfolios = myDoc
      ? state.portfolios
          .filter(p => !p._doc || p._doc === myDoc)
          .map(({_doc, ...rest}) => rest)   // quitar _doc antes de guardar
      : state.portfolios.map(({_doc, ...rest}) => rest);

    // Guardar siempre aunque sea array vacío — permite borrar todas las carteras
    window._fbSave(myPortfolios);
  }
}

// ── TOAST ──
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.background = type==='err'?'#ef4444':type==='info'?'#334155':'#10b981';
  el.style.color = '#fff';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

    <!-- CAPITAL POR USUARIO (consolidado) -->
    ${(() => {
      const UDOCS_R = { 'ruben':'rmariscal1984@gmail.com', 'alvaro':'alvaro.cs987@gmail.com' };
      const USERS = [
        { doc:'ruben',  email:'rmariscal1984@gmail.com', name:'Rubén' },
        { doc:'alvaro', email:'alvaro.cs987@gmail.com',  name:'Álvaro' },
      ];
      return `<div class="card" style="padding-bottom:4px">
        <div class="section-title">CAPITAL POR CARTERA</div>
        ${USERS.map(u => {
          // --- Bolsa: todas las carteras de este usuario ---
          const uPs = ps.filter(p => !p._doc || p._doc === u.doc);
          if (uPs.length === 0) return '';
          const bolsa = uPs.reduce((acc, p) => {
            const st = calcStats(p.assets);
            return { inv: acc.inv + st.invested, cur: acc.cur + st.current, assets: acc.assets + p.assets.length };
          }, { inv:0, cur:0, assets:0 });
          const bolsaProfit = bolsa.cur - bolsa.inv;
          const bolsaPct    = bolsa.inv > 0 ? (bolsaProfit / bolsa.inv) * 100 : 0;
          const uColor      = uPs[0]?.color || '#00d4ff';

          // --- Crowdfunding ---
          const cs = crowdStats(getCrowdProjects(u.email));
          const crowdPct = cs.invested > 0 ? (() => {
            const projects = getCrowdProjects(u.email);
            const compProfit = projects.filter(p=>p.status==='Completado').reduce((s,p)=>s+(parseFloat(p.realProfit)||0),0);
            const actInv  = projects.filter(p=>p.status!=='Completado').reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
            const actRate = actInv > 0
              ? projects.filter(p=>p.status!=='Completado').reduce((s,p)=>s+(parseFloat(p.amount)||0)*(parseFloat(p.rate)||0),0) / actInv
              : 0;
            return ((compProfit + actInv * actRate/100) / cs.invested) * 100;
          })() : 0;
          const crowdProfit = cs.currentValue - cs.invested;

          // --- Total usuario ---
          const totalInv = bolsa.inv + cs.invested;
          const totalCur = bolsa.cur + cs.currentValue;
          const totalProfit = totalCur - totalInv;
          const totalPct = totalInv > 0 ? (totalProfit / totalInv) * 100 : 0;

          return `
          <div style="margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid #1e293b">

            <!-- Usuario header + total -->
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

                <div style="font-size:11px;font-weight:700;color:${pctColor(totalPct)}">${fmtPct(totalPct)} total · ${totalProfit>=0?'+':''}${fmt(totalProfit)}</div>

            </div>

            <!-- Fila bolsa -->
            <div style="display:flex;justify-content:space-between;align-items:center;
              padding:9px 11px;background:#0f172a;border-radius:9px;margin-bottom:6px;border:1px solid ${uColor}20">
              <div>
                <div style="font-size:10px;color:#64748b;font-weight:700;margin-bottom:2px">💼 BOLSA / FONDOS</div>
                <div style="font-size:10px;color:#475569">${bolsa.assets} activos · inv ${fmt(bolsa.inv)}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:14px;font-weight:800;font-family:monospace;color:${uColor}">${fmt(bolsa.cur)}</div>
                <div style="font-size:11px;font-weight:700;color:${pctColor(bolsaPct)}">${fmtPct(bolsaPct)} · ${bolsaProfit>=0?'+':''}${fmt(bolsaProfit)}</div>
              </div>
            </div>

            <!-- Fila crowdfunding (solo si tiene) -->
            ${cs.invested > 0 ? `
            <div style="display:flex;justify-content:space-between;align-items:center;
              padding:9px 11px;background:#0f172a;border-radius:9px;margin-bottom:6px;border:1px solid #10b98120">
              <div>
                <div style="font-size:10px;color:#10b981;font-weight:700;margin-bottom:2px">🏗️ CROWDFUNDING</div>
                <div style="font-size:10px;color:#475569">${getCrowdProjects(u.email).length} proyectos · inv ${fmt(cs.invested)}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:14px;font-weight:800;font-family:monospace;color:#10b981">${fmt(cs.currentValue)}</div>
                <div style="font-size:11px;font-weight:700;color:${pctColor(crowdPct)}">${fmtPct(crowdPct)} TIR · ${crowdProfit>=0?'+':''}${fmt(crowdProfit)}</div>
              </div>
            </div>
            ` : ''}

          </div>`;
        }).join('')}
      </div>`;

async function fetchBtcHistory(range) {
  if (_btcChartCache[range]) return _btcChartCache[range];

  // CoinGecko: días por rango
  const rangeMap = { '1D': 1, '7D': 7, '30D': 30, '1A': 365, 'TODO': 365 };
  const days = rangeMap[range] || 365;

  // Para TODO: Yahoo Finance desde el primer dato disponible de BTC-EUR
  if (range === 'TODO') {
    // period1=1279324800 = 17 Jul 2010 (primer precio BTC registrado)
    const period1 = 1279324800;
    const period2 = Math.floor(Date.now() / 1000);

    // Intento 1: Yahoo con period1/period2 absolutos, intervalo semanal
    try {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/BTC-EUR?interval=1wk&period1=${period1}&period2=${period2}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Yahoo ' + res.status);
      const data = await res.json();
      const result = data?.chart?.result?.[0];
      if (!result) throw new Error('no result');
      const timestamps = result.timestamp || [];
      const closes = result.indicators?.quote?.[0]?.close || [];
      const prices = timestamps
        .map((ts, i) => ({ ts: ts * 1000, p: closes[i] }))
        .filter(d => d.p != null && !isNaN(d.p));
      if (prices.length === 0) throw new Error('empty');
      console.log('Yahoo TODO: ' + prices.length + ' puntos desde ' + new Date(prices[0].ts).getFullYear());
      _btcChartCache[range] = prices;
      return prices;
    } catch(e) {
      console.warn('Yahoo TODO failed:', e.message);
    }

    // Intento 2: Binance mensual 10 años
    try {
      const url = 'https://api.binance.com/api/v3/klines?symbol=BTCEUR&interval=1M&limit=120';
      const res = await fetch(url);
      if (!res.ok) throw new Error('Binance ' + res.status);
      const data = await res.json();
      if (!Array.isArray(data) || data.length === 0) throw new Error('empty');
      const prices = data.map(d => ({ ts: d[0], p: parseFloat(d[4]) })).filter(d => !isNaN(d.p));
      console.log('Binance TODO: ' + prices.length + ' puntos');
      _btcChartCache[range] = prices;
      return prices;
    } catch(e) {
      console.warn('Binance TODO failed:', e.message);
      return null;
    }
  }

  // CoinGecko para el resto de rangos
  try {
    const url = `https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=eur&days=${days}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('CoinGecko ' + res.status);
    const data = await res.json();
    const prices = (data.prices || []).map(([ts, p]) => ({ ts, p }));
    if (prices.length === 0) throw new Error('Empty');
    _btcChartCache[range] = prices;
    return prices;
  } catch(e) {
    console.warn('CoinGecko BTC error:', e.message);
    return null;
  }
}

// Extrae compras de BTC del portfolio de un usuario
function getBtcPurchases(userEmail, btcIdentifier) {
  const myDoc = { [RUBEN_EMAIL]: 'ruben', [ALVARO_EMAIL]: 'alvaro' }[userEmail];
  const myPortfolios = state.portfolios.filter(p => !p._doc || p._doc === myDoc);
  const purchases = [];
  for (const portfolio of myPortfolios) {
    for (const asset of (portfolio.assets || [])) {
      const isMatch = asset.ticker === btcIdentifier ||
                      (asset.ticker || '').toUpperCase() === btcIdentifier.toUpperCase();
      if (!isMatch) continue;
      for (const buy of (asset.purchases || [])) {
        if (buy.date && buy.price > 0) {
          purchases.push({ date: buy.date, price: buy.price, qty: buy.qty });
        }
      }
    }
  }
  return purchases;
}

async function drawBtcChart(range) {
  const canvas  = document.getElementById('btc-chart-canvas');
  const loading = document.getElementById('btc-chart-loading');
  const legend  = document.getElementById('btc-chart-legend');
  if (!canvas || !loading) return;

  loading.style.display = 'block';
  canvas.style.display  = 'none';
  loading.innerHTML = '⏳ Cargando datos históricos...';

  const prices = await fetchBtcHistory(range);
  if (!prices || prices.length === 0) {
    loading.innerHTML = range === 'TODO'
      ? '⚠️ TODO: ninguna API respondió. Abre la consola (F12) para ver los errores exactos.'
      : '⚠️ No se pudieron cargar datos históricos de Bitcoin';
    return;
  }

  loading.style.display = 'none';
  canvas.style.display  = 'block';

  // Compras de cada usuario
  const rubenPurchases  = getBtcPurchases(RUBEN_EMAIL, 'BTC');
  const alvaroPurchases = getBtcPurchases(ALVARO_EMAIL, BTC_ETC_ISIN)
                       .concat(getBtcPurchases(ALVARO_EMAIL, 'BTCE'));

  // Canvas sizing — trabajar siempre en coordenadas CSS, escalar al final
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.offsetWidth;
  const cssH = 200;
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.height = cssH + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr); // escalar una vez, trabajar en CSS px desde aquí
  ctx.clearRect(0, 0, cssW, cssH);

  // Padding en CSS px
  const PAD_LEFT   = 52;
  const PAD_RIGHT  = 12;
  const PAD_TOP    = 12;
  const PAD_BOTTOM = 28;
  const gW = cssW - PAD_LEFT - PAD_RIGHT;
  const gH = cssH - PAD_TOP  - PAD_BOTTOM;

  const minTs = prices[0].ts;
  const maxTs = prices[prices.length - 1].ts;
  const allP  = prices.map(d => d.p);
  const minP  = Math.min(...allP) * 0.97;
  const maxP  = Math.max(...allP) * 1.03;

  const xS = ts  => PAD_LEFT + ((ts  - minTs) / (maxTs - minTs)) * gW;
  const yS = val => PAD_TOP  + gH  - ((val - minP)  / (maxP  - minP))  * gH;

  // Fondo
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, cssW, cssH);

  // Grid horizontal + etiquetas Y
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  const N_GRID = 4;
  for (let i = 0; i <= N_GRID; i++) {
    const val = minP + ((maxP - minP) / N_GRID) * (N_GRID - i);
    const y   = PAD_TOP + (gH / N_GRID) * i;
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD_LEFT, y); ctx.lineTo(PAD_LEFT + gW, y); ctx.stroke();
    ctx.fillStyle = '#64748b';
    const lbl = val >= 1000 ? Math.round(val/1000) + 'k' : Math.round(val) + '';
    ctx.fillText(lbl, PAD_LEFT - 4, y + 3);
  }

  // Línea BTC
  const grad = ctx.createLinearGradient(PAD_LEFT, 0, PAD_LEFT + gW, 0);
  grad.addColorStop(0, '#f97316'); grad.addColorStop(0.5, '#fb923c'); grad.addColorStop(1, '#f59e0b');
  ctx.beginPath();
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1.5;
  prices.forEach((d, i) => { i === 0 ? ctx.moveTo(xS(d.ts), yS(d.p)) : ctx.lineTo(xS(d.ts), yS(d.p)); });
  ctx.stroke();

  // Área bajo la línea
  ctx.beginPath();
  prices.forEach((d, i) => { i === 0 ? ctx.moveTo(xS(d.ts), yS(d.p)) : ctx.lineTo(xS(d.ts), yS(d.p)); });
  ctx.lineTo(xS(maxTs), PAD_TOP + gH); ctx.lineTo(PAD_LEFT, PAD_TOP + gH); ctx.closePath();
  const aG = ctx.createLinearGradient(0, PAD_TOP, 0, PAD_TOP + gH);
  aG.addColorStop(0, 'rgba(249,115,22,0.15)'); aG.addColorStop(1, 'rgba(249,115,22,0)');
  ctx.fillStyle = aG; ctx.fill();

  // Puntos de compra — guardamos coords para tooltip
  window._btcDots = [];
  const drawDots = (purchases, color, label) => {
    (purchases || []).forEach(buy => {
      const buyTs = new Date(buy.date).getTime();
      if (buyTs < minTs || buyTs > maxTs) return;
      let closest = prices[0], minD = Math.abs(prices[0].ts - buyTs);
      for (const d of prices) { const dd = Math.abs(d.ts - buyTs); if (dd < minD) { minD = dd; closest = d; } }
      const x = xS(closest.ts), y = yS(closest.p);
      ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
      // Guardar para tooltip
      window._btcDots.push({ x, y, color, label,
        date: buy.date,
        buyPrice: buy.price,   // precio de compra del activo (EUR)
        qty: buy.qty
      });
    });
  };
  drawDots(rubenPurchases,  '#00d4ff', 'Rubén');
  drawDots(alvaroPurchases, '#a78bfa', 'Álvaro');

  // Touch / click → tooltip
  attachBtcTooltip(canvas, cssW, cssH);

  // Etiquetas X — align según posición para que no se corten
  ctx.fillStyle = '#64748b';
  ctx.font = '9px monospace';
  const N_X = 4;
  for (let i = 0; i <= N_X; i++) {
    const ts = minTs + ((maxTs - minTs) / N_X) * i;
    const x  = xS(ts);
    const d  = new Date(ts);
    let lbl;
    if (range === '1D')      lbl = d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
    else if (range === '7D') lbl = d.getDate() + '/' + (d.getMonth()+1);
    else                     lbl = d.getDate() + '/' + (d.getMonth()+1) + '/' + String(d.getFullYear()).slice(2);
    // primer label: izquierda, último: derecha, resto: centrado
    ctx.textAlign = i === 0 ? 'left' : i === N_X ? 'right' : 'center';
    ctx.fillText(lbl, x, cssH - 6);
  }

  // Alarmas: dibuja líneas horizontales en canvas
  const activeAlarms = getAlarms().filter(a => !a.triggered);
  activeAlarms.forEach(a => {
    if (a.price < minP || a.price > maxP) return;
    const y = yS(a.price);
    const color = a.direction === 'above' ? '#10b981' : '#ef4444';
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.moveTo(PAD_LEFT, y); ctx.lineTo(PAD_LEFT + gW, y); ctx.stroke();
    ctx.restore();
    // Price label on right
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.fillStyle = color;
    ctx.fillText(a.price.toLocaleString('es-ES'), PAD_LEFT + gW - 2, y - 3);
  });
  renderAlarmLines();

  // Leyenda
  const lastPrice = prices[prices.length - 1].p;
  const nR = (rubenPurchases  || []).filter(b => new Date(b.date).getTime() >= minTs).length;
  const nA = (alvaroPurchases || []).filter(b => new Date(b.date).getTime() >= minTs).length;
  if (legend) legend.innerHTML = `
    <span style="display:flex;align-items:center;gap:4px">
      <svg width="10" height="10"><circle cx="5" cy="5" r="5" fill="#00d4ff"/></svg>
      Rubén BTC (${nR} compra${nR!==1?'s':''})
    </span>
    <span style="display:flex;align-items:center;gap:4px">
      <svg width="10" height="10"><circle cx="5" cy="5" r="5" fill="#a78bfa"/></svg>
      Álvaro ETC (${nA} compra${nA!==1?'s':''})
    </span>
    <span style="color:#64748b">• Precio actual: ${lastPrice.toLocaleString('es-ES',{maximumFractionDigits:0})} €</span>
  `;
}

// ── BTC CHART TOOLTIP ──
function attachBtcTooltip(canvas, cssW, cssH) {
  // Use named handlers so we can remove and re-add without cloning
  // (cloning would discard the already-drawn pixels)
  if (canvas._btcClickHandler)  canvas.removeEventListener('click',      canvas._btcClickHandler);
  if (canvas._btcTouchHandler)  canvas.removeEventListener('touchstart', canvas._btcTouchHandler);

  function handleInteraction(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = cssW / rect.width;
    const scaleY = cssH / rect.height;
    const mx = (clientX - rect.left) * scaleX;
    const my = (clientY - rect.top)  * scaleY;

    // Find closest dot within 18px
    let best = null, bestD = 18;
    (window._btcDots || []).forEach(dot => {
      const d = Math.sqrt((dot.x - mx)**2 + (dot.y - my)**2);
      if (d < bestD) { bestD = d; best = dot; }
    });

    // Remove existing tooltip
    const old = document.getElementById('btc-tooltip');
    if (old) old.remove();
    if (!best) return;

    // Build tooltip
    const tip = document.createElement('div');
    tip.id = 'btc-tooltip';
    const buyPriceStr = best.buyPrice
      ? best.buyPrice.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €'
      : '—';
    const qtyStr = best.qty ? best.qty + ' uds' : '';
    tip.innerHTML = `
      <div style="font-size:10px;color:#64748b;margin-bottom:3px">${best.label} · ${best.date}</div>
      <div style="font-size:13px;font-weight:800;color:${best.color}">${buyPriceStr}</div>
      ${qtyStr ? `<div style="font-size:10px;color:#94a3b8;margin-top:2px">${qtyStr}</div>` : ''}
    `;
    Object.assign(tip.style, {
      position: 'absolute',
      background: '#1e293b',
      border: `1px solid ${best.color}60`,
      borderRadius: '8px',
      padding: '7px 10px',
      pointerEvents: 'none',
      zIndex: '9999',
      boxShadow: '0 4px 16px rgba(0,0,0,0.5)',
      whiteSpace: 'nowrap',
    });

    // Position relative to canvas rect
    const cardEl = canvas.closest('.card') || document.body;
    const cardRect = cardEl.getBoundingClientRect();
    let left = rect.left - cardRect.left + best.x / scaleX + 10;
    let top  = rect.top  - cardRect.top  + best.y / scaleY - 40;
    // Keep within card
    tip.style.left = Math.max(4, Math.min(left, cardRect.width - 140)) + 'px';
    tip.style.top  = Math.max(4, top) + 'px';
    cardEl.style.position = 'relative';
    cardEl.appendChild(tip);

    // Auto-dismiss after 2.5s
    setTimeout(() => { const t = document.getElementById('btc-tooltip'); if (t) t.remove(); }, 2500);
  }

}

  const xS = ts  => PAD_LEFT + ((ts-minTs)/(maxTs-minTs))*gW;
  const yS = val => PAD_TOP  + gH - ((val-minP)/(maxP-minP))*gH;

  ctx.fillStyle = '#080c14';
  ctx.fillRect(0,0,cssW,cssH);

  // Grid
  ctx.font = '10px monospace'; ctx.textAlign = 'right';
  for (let i=0; i<=5; i++) {
    const val = minP + ((maxP-minP)/5)*(5-i);
    const y   = PAD_TOP + (gH/5)*i;
    ctx.strokeStyle='#1e293b'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PAD_LEFT,y); ctx.lineTo(PAD_LEFT+gW,y); ctx.stroke();
    ctx.fillStyle='#64748b';
    const lbl = val>=1000 ? (val/1000).toFixed(val<10000?1:0)+'k' : Math.round(val)+'';
    ctx.fillText(lbl, PAD_LEFT-5, y+3);
  }

  // Line
  const grad = ctx.createLinearGradient(PAD_LEFT,0,PAD_LEFT+gW,0);
  grad.addColorStop(0,'#f97316'); grad.addColorStop(0.5,'#fb923c'); grad.addColorStop(1,'#f59e0b');
  ctx.beginPath(); ctx.strokeStyle=grad; ctx.lineWidth=2;
  prices.forEach((d,i)=>{ i===0?ctx.moveTo(xS(d.ts),yS(d.p)):ctx.lineTo(xS(d.ts),yS(d.p)); });
  ctx.stroke();

  // Area
  ctx.beginPath();
  prices.forEach((d,i)=>{ i===0?ctx.moveTo(xS(d.ts),yS(d.p)):ctx.lineTo(xS(d.ts),yS(d.p)); });
  ctx.lineTo(xS(maxTs),PAD_TOP+gH); ctx.lineTo(PAD_LEFT,PAD_TOP+gH); ctx.closePath();
  const aG=ctx.createLinearGradient(0,PAD_TOP,0,PAD_TOP+gH);
  aG.addColorStop(0,'rgba(249,115,22,0.18)'); aG.addColorStop(1,'rgba(249,115,22,0)');
  ctx.fillStyle=aG; ctx.fill();

  // Dots
  window._btcFsDots = [];
  const drawFsDots = (purchases, color, label) => {
    (purchases||[]).forEach(buy => {
      const buyTs = new Date(buy.date).getTime();
      if (buyTs<minTs||buyTs>maxTs) return;
      let closest=prices[0], minD=Math.abs(prices[0].ts-buyTs);
      for (const d of prices) { const dd=Math.abs(d.ts-buyTs); if(dd<minD){minD=dd;closest=d;} }
      const x=xS(closest.ts), y=yS(closest.p);
      ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fill();
      ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();
      ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
      window._btcFsDots.push({ x,y,color,label, date:buy.date, buyPrice:buy.price, qty:buy.qty });
    });
  };
  drawFsDots(rubenPurchases,'#00d4ff','Rubén');
  drawFsDots(alvaroPurchases,'#a78bfa','Álvaro');

  // X labels
  ctx.fillStyle='#64748b'; ctx.font='10px monospace';
  const N_X=5;
  for (let i=0;i<=N_X;i++) {
    const ts=minTs+((maxTs-minTs)/N_X)*i;
    const x=xS(ts); const d=new Date(ts);
    let lbl;
    if(range==='1D') lbl=d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    else if(range==='7D') lbl=d.getDate()+'/'+(d.getMonth()+1);
    else lbl=d.getDate()+'/'+(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(2);
    ctx.textAlign=i===0?'left':i===N_X?'right':'center';
    ctx.fillText(lbl, x, cssH-8);
  }

  // Legend
  const lastPrice=prices[prices.length-1].p;
  const nR=(rubenPurchases||[]).filter(b=>new Date(b.date).getTime()>=minTs).length;
  const nA=(alvaroPurchases||[]).filter(b=>new Date(b.date).getTime()>=minTs).length;
  if (legend) legend.innerHTML=`
    <span style="display:flex;align-items:center;gap:4px">
      <svg width="10" height="10"><circle cx="5" cy="5" r="5" fill="#00d4ff"/></svg>
      Rubén BTC (${nR} compra${nR!==1?'s':''})
    </span>
    <span style="display:flex;align-items:center;gap:4px">
      <svg width="10" height="10"><circle cx="5" cy="5" r="5" fill="#a78bfa"/></svg>
      Álvaro ETC (${nA} compra${nA!==1?'s':''})
    </span>
    <span style="color:#64748b">• ${lastPrice.toLocaleString('es-ES',{maximumFractionDigits:0})} €</span>
  `;

  // Tooltip on fullscreen canvas
  function handleFsInteraction(clientX, clientY) {
    const rect=canvas.getBoundingClientRect();
    const scaleX=cssW/rect.width, scaleY=cssH/rect.height;
    const mx=(clientX-rect.left)*scaleX, my=(clientY-rect.top)*scaleY;
    let best=null, bestD=22;
    (window._btcFsDots||[]).forEach(dot=>{
      const d=Math.sqrt((dot.x-mx)**2+(dot.y-my)**2);
      if(d<bestD){bestD=d;best=dot;}
    });
    const old=document.getElementById('btc-fs-tip'); if(old) old.remove();
    if(!best) return;
    const tip=document.createElement('div');
    tip.id='btc-fs-tip';
    const buyPriceStr=best.buyPrice?best.buyPrice.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €':'—';
    tip.innerHTML=`
      <div style="font-size:11px;color:#64748b;margin-bottom:3px">${best.label} · ${best.date}</div>
      <div style="font-size:16px;font-weight:800;color:${best.color}">${buyPriceStr}</div>
      ${best.qty?`<div style="font-size:11px;color:#94a3b8;margin-top:2px">${best.qty} uds</div>`:''}
    `;
    Object.assign(tip.style,{
      position:'fixed', background:'#1e293b', border:`1px solid ${best.color}60`,
      borderRadius:'10px', padding:'9px 13px', pointerEvents:'none',
      zIndex:'10001', boxShadow:'0 4px 20px rgba(0,0,0,0.6)', whiteSpace:'nowrap',
    });
    const overlay=document.getElementById('btc-fs-overlay');
    const orect=overlay.getBoundingClientRect();
    let lx=clientX+14, ly=clientY-60;
    if(lx+160>orect.right) lx=clientX-170;
    if(ly<orect.top+10) ly=clientY+14;
    tip.style.left=lx+'px'; tip.style.top=ly+'px';
    document.body.appendChild(tip);
    setTimeout(()=>{ const t=document.getElementById('btc-fs-tip'); if(t) t.remove(); },2500);
  }
  canvas.addEventListener('click', e=>handleFsInteraction(e.clientX,e.clientY));
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.touches[0]; handleFsInteraction(t.clientX,t.clientY); },{passive:false});
}

function drawDashRentability(ps) {
  const canvas  = document.getElementById('dash-rent-canvas');
  const emptyEl = document.getElementById('dash-rent-empty');
  const legendEl= document.getElementById('dash-rent-legend');
  if (!canvas) return;

  // Build per-USER consolidated series (bolsa + crowdfunding)
  const USERS = [
    { doc: 'ruben',  email: 'rmariscal1984@gmail.com', name: 'Rubén',  color: '#00d4ff' },
    { doc: 'alvaro', email: 'alvaro.cs987@gmail.com',  name: 'Álvaro', color: '#a78bfa' },
  ];

  const series = USERS.map(u => {
    const uPs = ps.filter(p => !p._doc || p._doc === u.doc);
    if (uPs.length === 0) return null;

    // Bolsa invested (static)
    const bolsaInv = uPs.reduce((s, p) =>
      s + p.assets.reduce((a, asset) => a + asset.quantity * asset.buyPrice, 0), 0);

    // Crowdfunding invested (static)
    const cs = crowdStats(getCrowdProjects(u.email));
    const crowdInv = cs.invested;
    const crowdCur = cs.currentValue; // static current value

    const totalInv = bolsaInv + crowdInv;
    if (totalInv === 0) return null;

    // Get all historical dates from bolsa
    const dates = [...new Set(uPs.flatMap(p =>
      p.assets.flatMap(a => (a.history||[]).map(h => h.date))
    ))].sort();

    if (dates.length < 2) return null;

    const points = dates.map(date => {
      let bolsaVal = 0;
      uPs.forEach(p => {
        p.assets.forEach(a => {
          const entry = [...(a.history||[])].reverse().find(h => h.date <= date);
          bolsaVal += a.quantity * (entry ? entry.price : a.buyPrice);
        });
      });
      const totalVal = bolsaVal + crowdCur;
      const pct = ((totalVal - totalInv) / totalInv) * 100;
      return { date, pct };
    });

    return { name: u.name, color: u.color, points };
  }).filter(Boolean).filter(s => s.points.length >= 2);

  if (series.length === 0) {
    canvas.style.display = 'none';
    if (emptyEl) emptyEl.style.display = 'block';
    if (legendEl) legendEl.innerHTML = '';
    return;
  }
  canvas.style.display = '';
  if (emptyEl) emptyEl.style.display = 'none';

  // Legend
  if (legendEl) {
    legendEl.innerHTML = series.map(s => {
      const last = s.points[s.points.length-1]?.pct || 0;
      return `<div style="display:flex;align-items:center;gap:5px">
        <div style="width:12px;height:3px;border-radius:2px;background:${s.color}"></div>
        <span style="color:#94a3b8">${s.name}</span>
        <span style="color:${last>=0?'#10b981':'#ef4444'};font-weight:700">${last>=0?'+':''}${last.toFixed(1)}%</span>
      </div>`;
    }).join('');
  }

  const dpr = window.devicePixelRatio || 1;
  const w   = canvas.getBoundingClientRect().width || canvas.parentElement?.getBoundingClientRect().width || 320;
  const h   = 150;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Collect all pct values to find global min/max
  const allPcts = series.flatMap(s => s.points.map(p => p.pct));
  const minV = Math.min(...allPcts, 0);
  const maxV = Math.max(...allPcts, 0);
  const allDates = [...new Set(series.flatMap(s => s.points.map(p => p.date)))].sort();
  const pad = { t: 14, r: 10, b: 28, l: 46 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  const yScale = v => pad.t + ch - (((v - minV) / (maxV - minV || 1)) * ch);

  // Zero line
  const zeroY = yScale(0);
  ctx.beginPath(); ctx.setLineDash([4,4]); ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
  ctx.moveTo(pad.l, zeroY); ctx.lineTo(pad.l + cw, zeroY); ctx.stroke(); ctx.setLineDash([]);

  // Y axis labels
  ctx.fillStyle = '#475569'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
  [minV, 0, maxV].filter((v,i,a)=>a.indexOf(v)===i).forEach(v => {
    ctx.fillText((v>=0?'+':'')+v.toFixed(1)+'%', pad.l-5, yScale(v)+4);
  });

  // Draw each portfolio line
  series.forEach(s => {
    const n = s.points.length;
    const xStep = n > 1 ? cw / (n - 1) : cw;
    ctx.beginPath();
    s.points.forEach((pt, i) => {
      const x = pad.l + i * xStep;
      const y = yScale(pt.pct);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Dot at last point
    const lx = pad.l + (n-1)*xStep, ly = yScale(s.points[n-1].pct);
    ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI*2);
    ctx.fillStyle = s.color; ctx.fill();
  });

  // X axis labels from the longest series
  const longestSeries = series.reduce((a,b) => a.points.length >= b.points.length ? a : b);
  const pts = longestSeries.points;
  const xStep = pts.length > 1 ? cw / (pts.length-1) : cw;
  ctx.textAlign = 'center'; ctx.font = '9px DM Sans,sans-serif'; ctx.fillStyle = '#475569';
  const step = Math.max(1, Math.floor(pts.length / 4));
  pts.forEach((p, i) => {
    if (i % step === 0 || i === pts.length - 1) {
      ctx.fillText(p.date.slice(5), pad.l + i * xStep, h - 8);
    }
  });
}

function drawInvestmentByYear(ps) {
  const canvas  = document.getElementById('dash-invest-canvas');
  const emptyEl = document.getElementById('dash-invest-empty');
  const legendEl= document.getElementById('dash-invest-legend');
  if (!canvas) return;

  // Build year → portfolio → amount map
  const yearSet = new Set();
  const portfolioData = ps.map(p => {
    const byYear = {};
    p.assets.forEach(a => {
      if (a.purchases && a.purchases.length > 0) {
        a.purchases.forEach(pur => {
          const y = (pur.date || a.addedAt || '').slice(0,4) || '?';
          byYear[y] = (byYear[y]||0) + pur.qty * pur.price;
          yearSet.add(y);
        });
      } else {
        const y = (a.addedAt || '').slice(0,4) || '?';
        byYear[y] = (byYear[y]||0) + a.quantity * a.buyPrice;
        yearSet.add(y);
      }
    });
    return { name: p.name, color: p.color, byYear };
  });

  const years = [...yearSet].sort();
  const hasData = portfolioData.some(p => Object.keys(p.byYear).length > 0);

  if (!hasData || years.length === 0) {
    canvas.style.display = 'none';
    if (emptyEl) emptyEl.style.display = 'block';
    if (legendEl) legendEl.innerHTML = '';
    return;
  }
  canvas.style.display = '';
  if (emptyEl) emptyEl.style.display = 'none';

  // Legend
  if (legendEl) {
    legendEl.innerHTML = portfolioData.map(p => {
      const total = Object.values(p.byYear).reduce((s,v)=>s+v,0);
      return `<div style="display:flex;align-items:center;gap:5px">
        <div style="width:12px;height:12px;border-radius:3px;background:${p.color}"></div>
        <span style="color:#94a3b8">${p.name}</span>
        <span style="color:${p.color};font-weight:700">${fmt(total)}</span>
      </div>`;
    }).join('');
  }

  const dpr = window.devicePixelRatio || 1;
  const w   = canvas.getBoundingClientRect().width || canvas.parentElement?.getBoundingClientRect().width || 320;
  const h   = 180;
  canvas.width = w*dpr; canvas.height = h*dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const maxVal = Math.max(...years.map(y => portfolioData.reduce((s,p) => s+(p.byYear[y]||0), 0)), 1);
  const pad = { t:10, r:10, b:28, l:56 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;

  // Number of portfolios with data
  const nPort = portfolioData.length;
  const groupW = cw / years.length;
  const barW = Math.min(groupW / nPort * 0.72, 36);
  const groupPad = (groupW - barW * nPort) / 2;

  // Y axis guide lines
  [0, 0.5, 1].forEach(frac => {
    const val = maxVal * frac;
    const yPos = pad.t + ch - frac * ch;
    ctx.fillStyle = '#475569'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    let label = val >= 1e6 ? (val/1e6).toFixed(1)+'M' : val >= 1e3 ? (val/1e3).toFixed(0)+'k' : val.toFixed(0);
    ctx.fillText(label+'€', pad.l-6, yPos+4);
    ctx.beginPath(); ctx.setLineDash([3,3]); ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
    ctx.moveTo(pad.l, yPos); ctx.lineTo(pad.l+cw, yPos); ctx.stroke(); ctx.setLineDash([]);
  });

  // Draw bars — one per portfolio per year, side by side
  years.forEach((year, yi) => {
    const gx = pad.l + yi * groupW;
    portfolioData.forEach((p, pi) => {
      const val = p.byYear[year] || 0;
      if (val <= 0) return;
      const barH = (val / maxVal) * ch;
      const x = gx + groupPad + pi * barW;
      const y = pad.t + ch - barH;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(x, y, barW - 2, barH, [3,3,0,0]);
      else ctx.rect(x, y, barW - 2, barH);
      ctx.fill();
    });
    // Year label
    ctx.fillStyle = '#64748b'; ctx.font = '10px DM Sans,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(year, gx + groupW/2, h - 6);
  });
}

function drawPie(portfolio) {
  const canvas = document.getElementById('pie-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');

  // Bolsa assets
  const bolsaTotal = portfolio.assets.reduce((s,a)=>s+a.quantity*a.currentPrice,0);

  // Crowdfunding del usuario dueño de esta cartera
  const UDOC_EMAIL = { 'ruben':'rmariscal1984@gmail.com', 'alvaro':'alvaro.cs987@gmail.com' };
  const ownerEmail = UDOC_EMAIL[portfolio._doc] || window._fbUser?.email || '';
  const cs = crowdStats(getCrowdProjects(ownerEmail));
  const crowdVal = cs.currentValue;

  const grandTotal = bolsaTotal + crowdVal;
  if(grandTotal === 0) return;

  // Build data: activos por nombre + slice crowdfunding
  const data = portfolio.assets.map((a,i)=>({
    label: a.name,
    value: a.quantity * a.currentPrice,
    color: UCOLORS[i % UCOLORS.length],
    pct:   ((a.quantity * a.currentPrice / grandTotal) * 100).toFixed(1)
  }));

  if(crowdVal > 0) {
    data.push({
      label: '🏗️ Crowdfunding',
      value: crowdVal,
      color: '#10b981',
      pct:   ((crowdVal / grandTotal) * 100).toFixed(1)
    });
  }

  const cx=150,cy=80,r=70,ir=40;
  ctx.clearRect(0,0,300,160);
  let angle=-Math.PI/2;
  data.forEach(d=>{
    const slice=(d.value/grandTotal)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.fillStyle=d.color;ctx.fill();
    angle+=slice;
  });
  ctx.beginPath();ctx.arc(cx,cy,ir,0,Math.PI*2);ctx.fillStyle='#111827';ctx.fill();

  // Legend
  const legend = document.getElementById('pie-legend');
  if(legend) legend.innerHTML=data.map(d=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8"><div style="width:8px;height:8px;border-radius:50%;background:${d.color};flex-shrink:0"></div><span>${d.label} ${d.pct}%</span></div>`).join('');
}

    // Añadir al historial de precios también
    const hist = [...(a.history || [])];
    if (!hist.find(h => h.date === date)) hist.push({ date, price });
    hist.sort((x,y) => x.date.localeCompare(y.date));
    updateAsset(assetId, { quantity: newTotalQty, buyPrice: newAvgBuy, purchases, history: hist });
    toast(`+${qty} uds añadidas a ${a.name} ✓`);
  });

  // Precio live
  if (a.ticker) {
    document.getElementById('btn-live-price').addEventListener('click', async () => {
      const btn = document.getElementById('btn-live-price');
      const status = document.getElementById('live-price-status');
      btn.textContent = '⏳...'; btn.disabled = true;
      const result = await fetchPriceEUR(a.ticker);
      btn.disabled = false;
      if (result !== null) {
        const price = typeof result === 'object' ? result.price : result;
        document.getElementById('edit-new-price').value = price.toFixed(4);
        btn.textContent = '✅ Live';
        const extra = (typeof result === 'object' && result.resolvedTicker) ? ` · ${result.resolvedTicker}` : '';
        if (status) { status.textContent = `${fmt(price)}${extra} · ${new Date().toLocaleTimeString('es-ES')}`; status.style.color = '#10b981'; }
      } else {
        btn.textContent = '⚠️ Error';
        if (status) { status.textContent = 'No se pudo obtener cotización'; status.style.color = '#ef4444'; }
        setTimeout(() => { btn.textContent = '🔄 Live'; btn.disabled = false; }, 2000);
      }
    });
  }

  // Guardar precio
  document.getElementById('btn-save-price').addEventListener('click', () => {
    const price = parseFloat(document.getElementById('edit-new-price').value);
    if (isNaN(price) || price <= 0) { toast('Precio no válido', 'err'); return; }
    updateAsset(assetId, { currentPrice: price }, true);
    toast('Precio actualizado ✓');
  });

  // Venta
  document.getElementById('btn-sell').addEventListener('click', () => {
    const qty = parseFloat(document.getElementById('edit-sell-qty').value);
    if (isNaN(qty) || qty <= 0) { toast('Introduce una cantidad válida', 'err'); return; }
    if (qty > a.quantity) { toast(`Máximo: ${a.quantity} uds`, 'err'); return; }
    const remaining = +(a.quantity - qty).toFixed(8);
    if (remaining === 0) {
      deleteAsset(state.activeId, assetId);
      return;
    }
    updateAsset(assetId, { quantity: remaining });
    toast(`${qty} uds vendidas · quedan ${remaining}`);
  });
}

function updateAsset(assetId, changes, addHistory = false) {
  const today = new Date().toISOString().split('T')[0];
  state.portfolios = state.portfolios.map(p => {
    if (p.id !== state.activeId) return p;
    return {
      ...p, assets: p.assets.map(a => {
        if (a.id !== assetId) return a;
        const updated = { ...a, ...changes };
        if (addHistory && changes.currentPrice !== undefined) {
          const hist = [...(a.history || [])];
          const last = hist[hist.length - 1];
          if (!last || last.date !== today) hist.push({ date: today, price: changes.currentPrice });
          else hist[hist.length - 1] = { date: today, price: changes.currentPrice };
          updated.history = hist;
        }
        return updated;
      })
    };
  });
  saveData();
  closeModal();
  renderPortfolio();
}

async function autoFetchPrice() {
  const id = document.getElementById('f-ticker')?.value?.trim().toUpperCase();
  if (!id) return;
  const spin = document.getElementById('ticker-spin');
  const hint = document.getElementById('ticker-hint');
  const badge = document.getElementById('price-badge');
  const typeBadge = document.getElementById('id-type-badge');
  const curInp = document.getElementById('f-cur');
  const nameInp = document.getElementById('f-name');
  const btn = document.getElementById('btn-buscar-ticker');

  const type = detectIdType(id);
  const typeLabels = { isin: '🏦 ISIN detectado', crypto: '₿ Crypto', ticker: '📈 Ticker' };
  const typeColors = { isin: '#a78bfa', crypto: '#f59e0b', ticker: '#00d4ff' };

  if (typeBadge) {
    typeBadge.style.display = 'inline-block';
    typeBadge.innerHTML = `<span style="background:${typeColors[type]}18;color:${typeColors[type]};font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px">${typeLabels[type]}</span>`;
    if (type === 'isin') {
      typeBadge.innerHTML += ` <span style="font-size:10px;color:#64748b;margin-left:4px">Resolviendo mediante OpenFIGI...</span>`;
    }
  }

  if (spin) spin.style.display = 'inline-block';
  if (btn) { btn.textContent = '⏳ Buscando...'; btn.disabled = true; }
  if (hint) hint.textContent = type === 'isin' ? 'Consultando OpenFIGI + Yahoo Finance...' : 'Consultando Yahoo Finance...';

  const result = await fetchPriceEUR(id);

  if (spin) spin.style.display = 'none';
  if (btn) { btn.textContent = '🔍 Buscar cotización'; btn.disabled = false; }

  if (result !== null) {
    const price = typeof result === 'object' ? result.price : result;
    if (curInp) curInp.value = price.toFixed(4);
    if (badge) badge.style.display = 'block';
    // Autocompleta nombre si vino nombre y el campo está vacío
    if (nameInp && result.resolvedName && !nameInp.value.trim()) {
      nameInp.value = result.resolvedName;
    }
    const resolvedInfo = result.resolvedTicker ? ` → ${result.resolvedTicker}` : '';
    if (hint) { hint.textContent = `✅ ${fmt(price)}${resolvedInfo}`; hint.style.color = '#10b981'; }
    if (typeBadge && type === 'isin') {
      typeBadge.innerHTML = `<span style="background:#10b98118;color:#10b981;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px">✅ ISIN resuelto${resolvedInfo}</span>`;
    }
  } else {
    if (hint) { hint.textContent = type === 'isin' ? '⚠️ ISIN no encontrado en OpenFIGI. Introduce el precio manualmente.' : '⚠️ No encontrado. Prueba con otro ticker o introduce precio manualmente.'; hint.style.color = '#f59e0b'; }
  }
}

function addAsset() {
  const name=document.getElementById('f-name')?.value?.trim();
  const ticker=document.getElementById('f-ticker')?.value?.trim().toUpperCase();
  const qty=parseFloat(document.getElementById('f-qty')?.value);
  const buyRaw=parseFloat(document.getElementById('f-buy')?.value);
  const dateVal=document.getElementById('f-date')?.value;
  let cur=parseFloat(document.getElementById('f-cur')?.value);
  if(!name||isNaN(qty)||isNaN(buyRaw)){toast('Rellena los campos obligatorios *','err');return;}
  // Convertir a EUR si el precio se introdujo en USD
  const buy = window._buyCurrency === 'USD' ? buyRaw / (eurUsdRate || 1.08) : buyRaw;
  if (window._buyCurrency === 'USD') toast(`💱 ${buyRaw}$ → ${buy.toFixed(4)}€ (tipo ${(eurUsdRate||1.08).toFixed(4)})`, 'info');
  if(isNaN(cur)) cur = buy;
  const buyDate = dateVal || new Date().toISOString().slice(0,10);
  const category = document.getElementById('f-category')?.value || '';
  const a={
    id:Date.now().toString(),
    name,ticker,quantity:qty,buyPrice:buy,currentPrice:cur,
    addedAt:buyDate,
    category,
    purchases:[{date:buyDate, qty, price:buy}],
    history:[{date:buyDate,price:buy}]
  };
  state.portfolios=state.portfolios.map(p=>p.id!==state.activeId?p:{...p,assets:[...p.assets,a]});
  saveData();
  closeModal();
  toast(`${name} añadido ✓`);
  // Esperar a que Firebase confirme el write (3s) antes de refrescar precios
  // Si lo hacemos antes, el listener puede recibir un snapshot stale y perder el activo
  if (ticker) setTimeout(() => { if (state.dataLoaded) refreshAllPrices(true); }, 3500);
  renderPortfolio();
}

const CROWD_PLATFORMS = ['Wecity','Urbanitae','Civislend','Housers','Otra'];
const STATUS_COLORS = { 'Activo':'#10b981', 'Completado':'#00d4ff', 'Retrasado':'#ef4444', 'Pendiente':'#f59e0b' };
const STATUS_OPTS   = ['Activo','Pendiente','Completado','Retrasado'];

function crowdStats(projects) {
  const invested = projects.reduce((s,p) => s + (parseFloat(p.amount)||0), 0);

  // Valor actual de la cartera:
  // - Activo/Pendiente/Retrasado → capital invertido
  // - Completado → capital + beneficio real (realProfit) si existe, sino capital solo
  const currentValue = projects.reduce((s,p) => {
    const a = parseFloat(p.amount) || 0;
    if (p.status === 'Completado') return s + a + (parseFloat(p.realProfit) || 0);
    return s + a;
  }, 0);

  const realProfit = projects
    .filter(p => p.status === 'Completado')
    .reduce((s,p) => s + (parseFloat(p.realProfit)||0), 0);

  const expectedReturn = projects.reduce((s,p) => {
    const a = parseFloat(p.amount)||0, r = parseFloat(p.rate)||0, m = parseFloat(p.months)||12;
    return s + a * r/100 * m/12;
  }, 0);

  const weightedRate = invested > 0
    ? projects.reduce((s,p) => s + (parseFloat(p.amount)||0) * (parseFloat(p.rate)||0), 0) / invested
    : 0;

  const pct = invested > 0 ? ((currentValue - invested) / invested) * 100 : 0;

  return { invested, currentValue, realProfit, expectedReturn, weightedRate, pct };
}

function saveCrowdProject(email, idx) {
  const name     = document.getElementById('cf-name')?.value?.trim();
  const platform = document.getElementById('cf-platform')?.value;
  const amount   = parseFloat(document.getElementById('cf-amount')?.value);
  const rate     = parseFloat(document.getElementById('cf-rate')?.value);
  const months   = parseFloat(document.getElementById('cf-months')?.value) || 12;
  const status   = document.getElementById('cf-status')?.value;
  const startDate= document.getElementById('cf-start')?.value;
  const endDate  = document.getElementById('cf-end')?.value;
  const notes    = document.getElementById('cf-notes')?.value?.trim();
  if (!name || isNaN(amount) || isNaN(rate)) { toast('Rellena nombre, importe y TIR *', 'err'); return; }
  const realProfit = parseFloat(document.getElementById('cf-profit')?.value) || 0;
  const projects = [...getCrowdProjects(email)];
  projects[idx] = { ...projects[idx], name, platform, amount, rate, months, status, startDate, endDate: endDate||'', notes: notes||'', realProfit: status==='Completado' ? realProfit : 0 };
  setCrowdProjects(email, projects);
  saveCrowdData();
  closeModal();
  toast('✅ Proyecto actualizado');
  renderCrowd();
}

function deleteCrowdProject(email, idx) {
  if (!confirm('¿Eliminar este proyecto?')) return;
  const projects = getCrowdProjects(email).filter((_,i) => i !== idx);
  setCrowdProjects(email, projects);
  saveCrowdData();
  closeModal();
  toast('Proyecto eliminado', 'err');
  renderCrowd();
}
