async function loadExpensesData() {
  try {
    const remote = await window._fbLoadExpenses?.();
    if (remote) { state.expensesData = remote; try { localStorage.setItem(EXPENSES_KEY, JSON.stringify(remote)); } catch {} return; }
  } catch(e) {}
  try {
    const raw = localStorage.getItem(EXPENSES_KEY);
    if (raw) { state.expensesData = JSON.parse(raw); return; }
  } catch(e) {}
  state.expensesData = { entries: [] };
}

async function saveExpensesData() {
  try { localStorage.setItem(EXPENSES_KEY, JSON.stringify(state.expensesData)); } catch {}
  await window._fbSaveExpenses?.(state.expensesData);
}

function renderExpenses() {
  const entries = state.expensesData?.entries || [];
  const now = new Date();

  // Estado de navegación de mes
  if (!window._expViewMonth) window._expViewMonth = now.getMonth();
  if (!window._expViewYear)  window._expViewYear  = now.getFullYear();
  const vm = window._expViewMonth;
  const vy = window._expViewYear;

  const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // Entradas del mes visible
  const monthEntries = entries.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === vm && d.getFullYear() === vy;
  });
  const totalIncome  = monthEntries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const totalExpense = monthEntries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const balance = totalIncome - totalExpense;

  // Resumen anual (12 meses del año visible)
  const yearData = Array.from({length:12},(_,i)=>{
    const me = entries.filter(e=>{ const d=new Date(e.date); return d.getMonth()===i && d.getFullYear()===vy; });
    return {
      month: MONTH_NAMES[i].slice(0,3),
      income:  me.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0),
      expense: me.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0),
    };
  });
  const maxVal = Math.max(...yearData.map(d=>Math.max(d.income,d.expense)), 1);

  // Gastos por categoría del mes
  const byCat = {};
  monthEntries.filter(e=>e.type==='expense').forEach(e=>{ byCat[e.category]=(byCat[e.category]||0)+e.amount; });
  const topCats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);

  const isCurrentMonth = vm === now.getMonth() && vy === now.getFullYear();

  document.getElementById('screen').innerHTML = `
    <div style="padding:16px;max-width:480px;margin:0 auto;padding-bottom:100px">

      <!-- HEADER -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div>
          <div style="font-size:20px;font-weight:800">💸 Gastos & Ingresos</div>
          <div style="font-size:12px;color:#475569;margin-top:2px">Solo tú ves esto</div>
        </div>
        <button onclick="showAddExpense()" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#080c14;font-weight:800;padding:10px 16px;border-radius:12px;font-size:13px;border:none;cursor:pointer">+ Añadir</button>
      </div>

      <!-- NAVEGACIÓN MES -->
      <div style="display:flex;align-items:center;justify-content:space-between;background:#0f172a;border-radius:14px;padding:12px 16px;margin-bottom:16px;border:1px solid #1e293b">
        <button onclick="changeExpMonth(-1)" style="background:#1e293b;border:none;color:#94a3b8;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px">‹</button>
        <div style="text-align:center">
          <div style="font-size:15px;font-weight:800">${MONTH_NAMES[vm]} ${vy}</div>
          ${isCurrentMonth ? '<div style="font-size:10px;color:#00d4ff;font-weight:700">MES ACTUAL</div>' : ''}
        </div>
        <button onclick="changeExpMonth(1)" ${isCurrentMonth?'disabled style="background:#0f172a;border:none;color:#334155;width:32px;height:32px;border-radius:8px;cursor:not-allowed;font-size:16px"':'style="background:#1e293b;border:none;color:#94a3b8;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px"'}>›</button>
      </div>

      <!-- RESUMEN DEL MES -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        <div style="background:#0f172a;border-radius:12px;padding:12px;text-align:center;border:1px solid #10b98130">
          <div style="font-size:9px;color:#10b981;font-weight:700;margin-bottom:4px">INGRESOS</div>
          <div style="font-size:15px;font-weight:800;color:#10b981;font-family:monospace">${totalIncome.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})}€</div>
        </div>
        <div style="background:#0f172a;border-radius:12px;padding:12px;text-align:center;border:1px solid #ef444430">
          <div style="font-size:9px;color:#ef4444;font-weight:700;margin-bottom:4px">GASTOS</div>
          <div style="font-size:15px;font-weight:800;color:#ef4444;font-family:monospace">${totalExpense.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})}€</div>
        </div>
        <div style="background:#0f172a;border-radius:12px;padding:12px;text-align:center;border:1px solid ${balance>=0?'#00d4ff':'#f59e0b'}30">
          <div style="font-size:9px;color:${balance>=0?'#00d4ff':'#f59e0b'};font-weight:700;margin-bottom:4px">BALANCE</div>
          <div style="font-size:15px;font-weight:800;color:${balance>=0?'#00d4ff':'#f59e0b'};font-family:monospace">${balance>=0?'+':''}${balance.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})}€</div>
        </div>
      </div>

      <!-- GRÁFICA ANUAL -->
      <div style="background:#0f172a;border-radius:14px;padding:16px;margin-bottom:16px;border:1px solid #1e293b">
        <div style="font-size:11px;font-weight:800;color:#64748b;margin-bottom:14px">RESUMEN ${vy}
          <span style="margin-left:12px;font-size:9px"><span style="color:#10b981">■</span> Ingresos &nbsp;<span style="color:#ef4444">■</span> Gastos</span>
        </div>
        <div style="display:flex;align-items:flex-end;gap:4px;height:100px">
          ${yearData.map((d,i)=>{
            const incH = maxVal>0 ? Math.round((d.income/maxVal)*90) : 0;
            const expH = maxVal>0 ? Math.round((d.expense/maxVal)*90) : 0;
            const isActive = i===vm && vy===window._expViewYear;
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer" onclick="window._expViewMonth=${i};renderExpenses()">
              <div style="width:100%;display:flex;gap:1px;align-items:flex-end;height:90px">
                <div style="flex:1;background:${d.income>0?'#10b981':'#1e293b'};border-radius:3px 3px 0 0;height:${incH}px;min-height:${d.income>0?2:0}px;transition:height 0.3s;opacity:${isActive?1:0.6}"></div>

        ${monthEntries.length===0

          : [...monthEntries].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{

              const d = new Date(e.date);

                  <div>

        }

}

function changeExpMonth(dir) {
  let m = window._expViewMonth + dir;
  let y = window._expViewYear;
  if (m > 11) { m = 0; y++; }
  if (m < 0)  { m = 11; y--; }
  window._expViewMonth = m;
  window._expViewYear  = y;
  renderExpenses();
}

window._expActiveType = 'expense';
function switchExpType(type) {
  window._expActiveType = type;
  const cats = type === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  const expBtn = document.getElementById('exp-type-expense');
  const incBtn = document.getElementById('exp-type-income');
  if (expBtn) { expBtn.style.background = type==='expense'?'#ef444425':'#1e293b'; expBtn.style.color=type==='expense'?'#ef4444':'#64748b'; expBtn.style.borderColor=type==='expense'?'#ef444440':'#1e293b'; }
  if (incBtn) { incBtn.style.background = type==='income'?'#10b98125':'#1e293b'; incBtn.style.color=type==='income'?'#10b981':'#64748b'; incBtn.style.borderColor=type==='income'?'#10b98140':'#1e293b'; }
  const grid = document.getElementById('exp-cat-grid');
  if (!grid) return;
  const catInp = document.getElementById('exp-cat-val');
  if (catInp) catInp.value = '';
  grid.innerHTML = cats.map(c=>`<button onclick="selectExpCat('${c.replace(/'/g,"\\'")}')" id="expc-${c.replace(/[^a-z]/gi,'_')}"
    style="font-size:10px;font-weight:700;padding:5px 10px;border-radius:8px;border:1px solid #1e293b;background:#1e293b;color:#64748b;cursor:pointer;font-family:'DM Sans',sans-serif">
    ${EXP_CAT_ICONS[c]||'📌'} ${c}</button>`).join('');
}

function selectExpCat(cat) {
  const allCats = [...EXPENSE_CATS, ...INCOME_CATS];
  allCats.forEach(c => {
    const btn = document.getElementById(`expc-${c.replace(/[^a-z]/gi,'_')}`);
    if (!btn) return;
    const active = c === cat;
    const isInc = INCOME_CATS.includes(c);
    const col = isInc ? '#10b981' : '#f59e0b';
    btn.style.background = active ? col+'25' : '#1e293b';
    btn.style.color = active ? col : '#64748b';
    btn.style.borderColor = active ? col+'40' : '#1e293b';
  });
  const inp = document.getElementById('exp-cat-val');
  if (inp) inp.value = cat;
}

async function confirmAddExpense() {
  const amount = parseFloat(document.getElementById('exp-amount')?.value);
  const cat    = document.getElementById('exp-cat-val')?.value;
  const date   = document.getElementById('exp-date')?.value || new Date().toISOString().slice(0,10);
  const note   = document.getElementById('exp-note')?.value?.trim() || '';
  const type   = window._expActiveType || 'expense';
  if (!amount || amount <= 0) { toast('Introduce un importe válido','err'); return; }
  if (!cat) { toast('Selecciona una categoría','err'); return; }
  const entry = { id: Date.now().toString(), type, category: cat, amount, date, note };
  if (!state.expensesData.entries) state.expensesData.entries = [];
  state.expensesData.entries.push(entry);
  await saveExpensesData();
  closeModal();
  toast(`${type==='income'?'💰 Ingreso':'💸 Gasto'} añadido ✓`);
  renderExpenses();
}

async function deleteExpense(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;
  state.expensesData.entries = (state.expensesData.entries||[]).filter(e=>e.id!==id);
  await saveExpensesData();
  renderExpenses();
}

// ── BTC PRICE ALARMS ──────────────────────────────────────────────────────


const ALARM_KEY = 'btc-alarms-v1';

function getAlarms() {
  const me = myEmail();
  if (!me) return [];
  try {
    const raw = localStorage.getItem(ALARM_KEY);
    const all = raw ? JSON.parse(raw) : {};
    return all[me] || [];
  } catch { return []; }
}

function saveAlarms(alarms) {
  const me = myEmail();
  if (!me) return;
  try {
    const raw = localStorage.getItem(ALARM_KEY);
    const all = raw ? JSON.parse(raw) : {};
    all[me] = alarms;
    localStorage.setItem(ALARM_KEY, JSON.stringify(all));
  } catch {}
}

function addAlarm(price, direction, label) {
  const alarms = getAlarms();
  alarms.push({
    id: Date.now().toString(),
    price: parseFloat(price),
    direction, // 'above' | 'below'
    label: label || '',
    triggered: false,
    createdAt: new Date().toISOString().slice(0,10),
  });
  saveAlarms(alarms);
}

function deleteAlarm(id) {
  saveAlarms(getAlarms().filter(a => a.id !== id));
}

function resetAlarm(id) {
  const alarms = getAlarms().map(a => a.id === id ? {...a, triggered: false} : a);
  saveAlarms(alarms);
}

// Request notification permission
async function requestNotifPermission() {
  if (!('Notification' in window)) return 'unsupported';
  if (Notification.permission === 'granted') return 'granted';
  if (Notification.permission === 'denied') return 'denied';
  const result = await Notification.requestPermission();
  return result;
}

function sendNotification(title, body) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  try {
    new Notification(title, {
      body,
      icon: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Bitcoin.svg/64px-Bitcoin.svg.png',
      badge: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Bitcoin.svg/64px-Bitcoin.svg.png',
      tag: 'btc-alarm',
      vibrate: [200, 100, 200],
    });
  } catch(e) { console.warn('Notification error:', e); }
}

async function sendEmailAlarm(alarm, currentPrice) {
  try {
    const toEmail = window._fbUser?.email || 'rmariscal1984@gmail.com';
    await emailjs.send('service_gf2h3n2', 'template_59s5nmf', {
      to_email:            toEmail,
      alarm_label:         alarm.label || 'Sin etiqueta',
      alarm_condition:     alarm.direction === 'above' ? `BTC ≥ ${alarm.price.toLocaleString('es-ES')} €` : `BTC ≤ ${alarm.price.toLocaleString('es-ES')} €`,
      alarm_price:         alarm.price.toLocaleString('es-ES') + ' €',
      alarm_triggered_price: currentPrice.toLocaleString('es-ES') + ' €',
      alarm_time:          new Date().toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' }),
    });
    console.log('📧 Email de alarma enviado a', toEmail);
  } catch(e) {
    console.warn('EmailJS error:', e);
  }
}

// Check alarms against current BTC price — called every 60s
async function checkBtcAlarms() {
  const alarms = getAlarms();
  if (!alarms.length) return;

  // Fetch current BTC price (EUR) via CoinGecko simple price
  let currentPrice = null;
  try {
    const url = 'https://corsproxy.io/?url=' + encodeURIComponent('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur');
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    currentPrice = data?.bitcoin?.eur || null;
  } catch {}

  if (!currentPrice) return;
  window._btcLastPrice = currentPrice;

  // Update alarm badge on button
  const activeCount = alarms.filter(a => !a.triggered).length;
  const btn = document.getElementById('btc-alarm-btn');
  if (btn) {
    btn.style.color = activeCount > 0 ? '#f59e0b' : '#475569';
    btn.style.background = activeCount > 0 ? '#f59e0b18' : '#1e293b';
  }

  // Check each alarm
  let anyTriggered = false;
  const updated = alarms.map(a => {
    if (a.triggered) return a;
    const hit = (a.direction === 'above' && currentPrice >= a.price)
             || (a.direction === 'below' && currentPrice <= a.price);
    if (hit) {
      const dirLabel = a.direction === 'above' ? '📈 Superó' : '📉 Bajó de';
      const title = `🔔 Alarma BTC`;
      const body  = `${dirLabel} ${a.price.toLocaleString('es-ES')} € → Precio actual: ${currentPrice.toLocaleString('es-ES')} €${a.label ? ' · ' + a.label : ''}`;
      sendNotification(title, body);
      sendEmailAlarm(a, currentPrice);
      toast(`🔔 BTC ${dirLabel} ${a.price.toLocaleString('es-ES')} €`, 'info');
      anyTriggered = true;
      return { ...a, triggered: true, triggeredAt: new Date().toISOString(), triggeredPrice: currentPrice };
    }
    return a;
  });

  if (anyTriggered) {
    saveAlarms(updated);
    renderAlarmLines(); // refresh displayed lines
  }
}

// Draw alarm lines on BTC chart
function renderAlarmLines() {
  const container = document.getElementById('btc-alarm-lines');
  if (!container) return;
  const alarms = getAlarms();
  if (!alarms.length) { container.innerHTML = ''; return; }
  container.innerHTML = alarms.map(a => {
    const color = a.triggered ? '#475569' : (a.direction === 'above' ? '#10b981' : '#ef4444');
    const icon  = a.triggered ? '✓' : (a.direction === 'above' ? '↑' : '↓');
    return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
      padding:3px 8px;border-radius:6px;background:${color}15;color:${color};border:1px solid ${color}30;
      ${a.triggered ? 'opacity:0.5;' : ''}">
      ${icon} ${a.price.toLocaleString('es-ES')} €
      ${a.label ? `<span style="font-weight:400;color:#64748b">· ${a.label}</span>` : ''}
      ${a.triggered ? '<span style="font-size:9px;color:#475569">disparada</span>' : ''}
    </span>`;
  }).join('');
}

// Alarm management modal
async function showBtcAlarms() {
  const perm = await requestNotifPermission();
  const alarms = getAlarms();
  const currentPrice = window._btcLastPrice || null;

  const permBanner = perm !== 'granted'
    ? `<div style="background:#f59e0b15;border:1px solid #f59e0b30;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:#f59e0b">

          ? 'Notificaciones bloqueadas. Actívalas en la configuración del navegador.'

       </div>`
    : '';

  showModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">

      ${currentPrice ? `<span style="font-size:12px;color:#f59e0b;font-weight:700">${currentPrice.toLocaleString('es-ES')} €</span>` : ''}
    </div>

    ${permBanner}

    <!-- Nueva alarma -->
    <div style="background:#0f172a;border-radius:10px;padding:12px;margin-bottom:16px;border:1px solid #1e293b">
      <div style="font-size:11px;color:#64748b;font-weight:700;margin-bottom:10px">NUEVA ALARMA</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <label style="font-size:10px;color:#64748b;font-weight:700;display:block;margin-bottom:3px">PRECIO (€)</label>
          <input id="al-price" type="number" class="inp" placeholder="Ej: 90000" inputmode="decimal"
            value="${currentPrice ? Math.round(currentPrice) : ''}" style="font-family:monospace"/>
        </div>
        <div>
          <label style="font-size:10px;color:#64748b;font-weight:700;display:block;margin-bottom:3px">DIRECCIÓN</label>
          <select id="al-dir" class="inp">
            <option value="above">📈 Sube de</option>
            <option value="below">📉 Baja de</option>
          </select>
        </div>
      </div>
      <label style="font-size:10px;color:#64748b;font-weight:700;display:block;margin-bottom:3px">NOTA (opcional)</label>
      <input id="al-label" class="inp" placeholder="Ej: Resistencia clave" style="margin-bottom:10px"/>
      <button onclick="submitAddAlarm()"
        style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;font-weight:800;
        padding:10px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px">
        + Añadir alarma
      </button>
    </div>

    <!-- Lista de alarmas -->
    <div id="alarm-list-container">
      ${renderAlarmListHTML(alarms)}
    </div>
  `);
}

function renderAlarmListHTML(alarms) {
  if (!alarms.length) return '<div style="text-align:center;color:#475569;font-size:12px;padding:16px 0">Sin alarmas configuradas</div>';
  return alarms.map(a => {
    const color = a.triggered ? '#475569' : (a.direction === 'above' ? '#10b981' : '#ef4444');
    const dirLabel = a.direction === 'above' ? '📈 Sube de' : '📉 Baja de';
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;
        padding:10px 12px;background:#0f172a;border-radius:10px;margin-bottom:8px;
        border:1px solid ${color}30;${a.triggered ? 'opacity:0.6' : ''}">
        <div>
          <div style="font-size:13px;font-weight:800;color:${color}">${dirLabel} ${a.price.toLocaleString('es-ES')} €</div>
          <div style="font-size:10px;color:#64748b;margin-top:2px">
            ${a.label ? a.label + ' · ' : ''}${a.createdAt}
            ${a.triggered ? ` · <span style="color:#10b981">Disparada ${a.triggeredAt ? a.triggeredAt.slice(0,10) : ''}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${a.triggered ? `<button onclick="resetAlarm('${a.id}');refreshAlarmModal()"
            style="font-size:10px;background:#1e293b;color:#64748b;border:none;padding:5px 8px;border-radius:6px;cursor:pointer">↺ Reset</button>` : ''}
          <button onclick="deleteAlarm('${a.id}');refreshAlarmModal()"
            style="font-size:10px;background:#ef444415;color:#ef4444;border:1px solid #ef444430;
            padding:5px 8px;border-radius:6px;cursor:pointer">✕</button>
        </div>
      </div>`;
  }).join('');
}

function submitAddAlarm() {
  const price = parseFloat(document.getElementById('al-price')?.value);
  const dir   = document.getElementById('al-dir')?.value;
  const label = document.getElementById('al-label')?.value?.trim();
  if (!price || price <= 0) { toast('Introduce un precio válido', 'err'); return; }
  addAlarm(price, dir, label);
  toast(`🔔 Alarma añadida: ${dir === 'above' ? '↑' : '↓'} ${price.toLocaleString('es-ES')} €`);
  refreshAlarmModal();
  renderAlarmLines();
}

function refreshAlarmModal() {
  const container = document.getElementById('alarm-list-container');
  if (container) container.innerHTML = renderAlarmListHTML(getAlarms());
}

// Start alarm polling (every 60s)
function startAlarmPolling() {
  if (window._alarmInterval) clearInterval(window._alarmInterval);
  checkBtcAlarms(); // immediate first check
  window._alarmInterval = setInterval(checkBtcAlarms, 60000);
}
