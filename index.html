    const app = initializeApp(firebaseConfig);

    // ── AUTH ──
    window._fbSignIn = async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch(e) {
        console.error('Sign in error:', e);
        document.dispatchEvent(new CustomEvent('auth-error', { detail: e.message }));
      }
    };

    window._fbSignOut = async () => {
      try {
        await signOut(auth);
      } catch(e) { console.error('Sign out error:', e); }
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUid = user.uid;
        window._fbUser = { uid: user.uid, name: user.displayName, email: user.email, photo: user.photoURL };
        window._fbReady = true;
        window._fbListenActive = false;
        document.dispatchEvent(new CustomEvent('auth-changed', { detail: { loggedIn: true } }));
      } else {
        currentUid = null;
        window._fbUser = null;
        window._fbReady = false;
        document.dispatchEvent(new CustomEvent('auth-changed', { detail: { loggedIn: false } }));
      }
    });

    // ── FIRESTORE ──
    window._fbSave = async (data) => {
      const ref = getDocRef();
      if (!ref) return;
      try {
        await setDoc(ref, { portfolios: JSON.stringify(data) });
        window._fbStatus && window._fbStatus('ok');
      } catch(e) {
        console.error('Firebase save error:', e);
        window._fbStatus && window._fbStatus('err');
      }
    };

    window._fbLoad = async () => {
      const ref = getDocRef();
      if (!ref) return null;
      try {
        const snap = await getDoc(ref);
        if (snap.exists()) return JSON.parse(snap.data().portfolios);
        return null;
      } catch(e) {
        console.error('Firebase load error:', e);
        return null;
      }
    };

    window._fbListen = (callback) => {
      const ref = getDocRef();
      if (!ref) return () => {};
      return onSnapshot(ref, (snap) => {
        if (snap.exists() && window._fbListenActive) {
          try { callback(JSON.parse(snap.data().portfolios)); } catch(e) {}
        }
      });
    };

    window._fbListenActive = false;
    document.dispatchEvent(new Event('firebase-ready'));
  </script>

let eurUsdRate = 1;

// ── PRICE FETCHING ──

// ── Detección de tipo de identificador ──
function detectIdType(id) {
  if (!id) return 'unknown';
  const t = id.trim().toUpperCase();
  // ISIN: 2 letras + 9 alfanum + 1 dígito control = 12 chars
  if (/^[A-Z]{2}[A-Z0-9]{9}[0-9]$/.test(t)) return 'isin';
  // Crypto conocidas
  const cryptos = ['BTC','ETH','SOL','ADA','XRP','DOGE','DOT','AVAX','MATIC','LINK','UNI','LTC','BCH','ATOM','NEAR','FTM','OP','ARB','PEPE','SHIB','BNB','USDT','USDC','TON','NEAR','SUI'];
  if (cryptos.includes(t) || t.endsWith('-USD') || t.endsWith('-EUR')) return 'crypto';
  return 'ticker';
}

// ── ISIN → ticker via Yahoo Finance Search (acepta ISIN directamente) ──
const isinCache = {};
async function isinToTicker(isin) {
  if (isinCache[isin]) return isinCache[isin];
  const yfUrl = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(isin)}&lang=en-US&region=ES&quotesCount=5&newsCount=0`;
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent(yfUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`,
    `https://corsproxy.org/?${encodeURIComponent(yfUrl)}`,
  ];
  for (const url of proxies) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      const quotes = data?.finance?.result?.[0]?.quotes || data?.quotes || [];
      if (!quotes.length) continue;
      // Preferimos EQUITY o ETF sobre otros tipos
      const best = quotes.find(q => ['EQUITY','ETF','MUTUALFUND'].includes(q.quoteType)) || quotes[0];
      const result = {
        ticker: best.symbol,
        yfSym: best.symbol,  // Yahoo ya devuelve el símbolo correcto con sufijo
        name: best.longname || best.shortname || best.symbol,
        type: best.quoteType,
        isin,
      };
      isinCache[isin] = result;
      return result;
    } catch {}
  }
  return null;
}

// Mapeo de exchCode OpenFIGI → sufijo Yahoo Finance (mantenido como fallback)
function buildYfSymbol(ticker, exchCode) {
  const map = {
    'GY': `${ticker}.DE`, 'NA': `${ticker}.AS`, 'FP': `${ticker}.PA`,
    'LN': `${ticker}.L`, 'SM': `${ticker}.MC`, 'SW': `${ticker}.SW`,
    'IM': `${ticker}.MI`, 'SS': `${ticker}.ST`, 'DC': `${ticker}.CO`,
    'HF': `${ticker}.HE`, 'US': ticker, 'UW': ticker, 'UN': ticker,
  };
  return map[exchCode] || ticker;
}

// ── Normaliza ticker puro (no ISIN) ──
function normalizeTicker(ticker) {
  if (!ticker) return null;
  const t = ticker.trim().toUpperCase();
  const type = detectIdType(t);
  if (type === 'crypto' && !t.includes('-')) return t + '-USD';
  return t;
}

// ── Fetch precio Yahoo Finance ──
async function fetchYfPrice(yfSymbol) {
  const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yfSymbol)}?interval=1m&range=1d`;
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent(yfUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`,
    `https://corsproxy.org/?${encodeURIComponent(yfUrl)}`,
  ];
  for (const url of proxies) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      const meta = data?.chart?.result?.[0]?.meta;
      if (!meta) continue;
      const price = meta.regularMarketPrice || meta.previousClose;
      const currency = (meta.currency || 'USD').toUpperCase();
      return { price, currency, symbol: meta.symbol, longName: meta.longName || meta.shortName };
    } catch {}
  }
  return null;
}

// ── Fetch precio con soporte ISIN+ticker+crypto ──
async function fetchPrice(id) {
  const type = detectIdType(id?.trim().toUpperCase());

  if (type === 'isin') {
    const mapped = await isinToTicker(id.trim().toUpperCase());
    if (!mapped) return null;
    const result = await fetchYfPrice(mapped.yfSym);
    if (result) return { ...result, resolvedTicker: mapped.yfSym, resolvedName: mapped.name, assetType: mapped.type };
    return null;
  }

  // Ticker o crypto
  const sym = normalizeTicker(id);
  if (!sym) return null;
  return fetchYfPrice(sym);
}

// ── USD/GBP/etc → EUR ──
let usdEurRate = null;
async function getUsdEurRate() {
  if (usdEurRate && (Date.now() - usdEurRate.ts) < 300000) return usdEurRate.rate;
  try {
    const yfUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/EURUSD=X?interval=1m&range=1d';
    const url = `https://corsproxy.io/?url=${encodeURIComponent(yfUrl)}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
    const data = await res.json();
    const rate = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
    if (rate) { usdEurRate = { rate: 1 / rate, ts: Date.now() }; return 1 / rate; }
  } catch {}
  return usdEurRate?.rate || 0.92;
}

async function toEUR(price, currency) {
  if (currency === 'EUR') return price;
  if (currency === 'GBp' || currency === 'GBX') {
    // Londres cotiza en peniques
    const gbpEur = await getExchangeRate('GBPEUR=X');
    return (price / 100) * (gbpEur || 1.17);
  }
  const rate = await getUsdEurRate();
  return price * rate;
}

async function getExchangeRate(pair) {
  try {
    const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${pair}?interval=1m&range=1d`;
    const url = `https://corsproxy.io/?url=${encodeURIComponent(yfUrl)}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
    const data = await res.json();
    return data?.chart?.result?.[0]?.meta?.regularMarketPrice || null;
  } catch { return null; }
}

async function fetchPriceEUR(id) {
  const result = await fetchPrice(id);
  if (!result) return null;
  const priceEur = await toEUR(result.price, result.currency);
  // Nombre: primero el de OpenFIGI (ISIN), si no el de Yahoo Finance
  const resolvedName = result.resolvedName || result.longName || null;
  return { price: priceEur, resolvedName, resolvedTicker: result.resolvedTicker, assetType: result.assetType };
}

// Refresca todos los activos de todas las carteras
async function refreshAllPrices(silent = false) {
  if (state.refreshing) return;
  state.refreshing = true;
  if (!silent) toast('⏳ Actualizando precios...', 'info');

  const today = new Date().toISOString().split('T')[0];
  let updated = 0, failed = 0;

  // Usamos el campo 'ticker' que puede contener ticker normal O isin
  const allIds = [...new Set(
    state.portfolios.flatMap(p => p.assets.map(a => a.ticker)).filter(Boolean)
  )];

  // Fetch en paralelo
  const prices = {};
  await Promise.all(allIds.map(async id => {
    const result = await fetchPriceEUR(id);
    if (result !== null) prices[id] = result;
    else failed++;
  }));

  state.portfolios = state.portfolios.map(p => ({
    ...p,
    assets: p.assets.map(a => {
      if (!a.ticker || prices[a.ticker] === undefined) return a;
      const result = prices[a.ticker];
      const price = typeof result === 'object' ? result.price : result;
      const hist = [...(a.history || [])];
      const last = hist[hist.length - 1];
      if (!last || last.date !== today) hist.push({ date: today, price });
      else hist[hist.length - 1] = { date: today, price };
      updated++;
      return { ...a, currentPrice: price, history: hist };
    })
  }));

  saveData();
  state.refreshing = false;
  state.lastRefresh = new Date();
  if (!silent) toast(`✅ ${updated} activos actualizados${failed > 0 ? ` (${failed} sin cotización)` : ''}`, 'ok');
  render();
}

// Auto-refresh cada N minutos
function startAutoRefresh(minutes = 5) {
  stopAutoRefresh();
  state.autoRefreshInterval = setInterval(() => refreshAllPrices(true), minutes * 60 * 1000);
}
function stopAutoRefresh() {
  if (state.autoRefreshInterval) { clearInterval(state.autoRefreshInterval); state.autoRefreshInterval = null; }
}

function calcStats(assets) {
  const invested = assets.reduce((s,a)=>s+a.quantity*a.buyPrice,0);
  const current = assets.reduce((s,a)=>s+a.quantity*a.currentPrice,0);
  const profit = current-invested;
  const pct = invested>0?(profit/invested)*100:0;
  return {invested,current,profit,pct};
}

// ── STORAGE ──
async function loadData() {
  const doStart = async () => {
    let loaded = false;
    try {
      const data = await window._fbLoad();
      if (data && Array.isArray(data) && data.length > 0) {
        state.portfolios = data;
        state.activeId = data[0]?.id || null;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        loaded = true;
      }
    } catch {}

    if (!loaded) {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          state.portfolios = JSON.parse(raw);
          state.activeId = state.portfolios[0]?.id || null;
          loaded = true;
        }
      } catch {}
    }

    if (!loaded) {
      state.portfolios = [];
      state.activeId = null;
    }

    state.loading = false;
    render();
    loadEurUsdRate();
    startAutoRefresh(5);
    setTimeout(() => refreshAllPrices(true), 1500);

    // Listener tiempo real
    if (!_fbUnsubscribe) {
      window._fbListenActive = true;
      _fbUnsubscribe = window._fbListen((remoteData) => {
        if (JSON.stringify(remoteData) !== JSON.stringify(state.portfolios)) {
          state.portfolios = remoteData;
          state.activeId = state.activeId || remoteData[0]?.id || null;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(remoteData));
          render();
          toast('📱 Cartera sincronizada', 'info');
        }
      });
    }
  };

  // Escucha cambios de autenticación
  const ALLOWED_EMAILS = ['rmariscal1984@gmail.com', 'alvaro.cs987@gmail.com'];

  document.addEventListener('auth-changed', async (e) => {
    if (e.detail.loggedIn) {
      // Verificar lista blanca de emails
      const email = window._fbUser?.email;
      if (!ALLOWED_EMAILS.includes(email)) {
        await window._fbSignOut();
        renderLogin('⛔ Acceso denegado. Esta app es privada.');
        return;
      }
      state.loading = true;
      render();
      await doStart();
    } else {
      // Desconectado — mostrar pantalla de login
      if (_fbUnsubscribe) { _fbUnsubscribe(); _fbUnsubscribe = null; }
      window._fbListenActive = false;
      state.portfolios = [];
      state.activeId = null;
      state.loading = false;
      renderLogin();
    }
  });

  document.addEventListener('auth-error', (e) => {
    renderLogin();
    toast('Error al iniciar sesión: ' + e.detail, 'err');
  });

  // Estado inicial: mostrar login si no hay usuario
  // auth-changed se dispara automáticamente al cargar
  renderLogin();
}

function saveData() {
  // Guarda siempre en local como backup
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.portfolios)); } catch {}
  // Guarda en Firebase si está disponible
  if (window._fbReady) {
    _fbStatus('saving');
    window._fbSave(state.portfolios);
  }
}

// ── TOAST ──
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.background = type==='err'?'#ef4444':type==='info'?'#334155':'#10b981';
  el.style.color = '#fff';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

// ── MODAL ──
function showModal(html, onReady) {
  closeModal();
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-bg" id="modal-bg"><div class="modal-sheet"><div class="modal-handle"></div>${html}</div></div>`;
  document.getElementById('modal-bg').addEventListener('click', e => { if(e.target.id==='modal-bg') closeModal(); });
  if(onReady) onReady();
}
function closeModal() {
  document.getElementById('modal-container').innerHTML='';
}

// ── RENDER ENGINE ──
function render() {
  renderNav();
  const s = state.screen;
  if(state.loading) { renderLoading(); return; }
  switch(state.view) {
    case 'dashboard': renderDashboard(); break;
    case 'portfolio': renderPortfolio(); break;
    case 'history':   renderHistory();   break;
    case 'compare':   renderCompare();   break;
  }
}

function setView(v) {
  state.view = v;
  state.editingAssetId = null;
  const el = document.getElementById('screen');
  el.scrollTop = 0;
  render();
}

function drawDashRentability(ps) {
  const canvas  = document.getElementById('dash-rent-canvas');
  const emptyEl = document.getElementById('dash-rent-empty');
  const legendEl= document.getElementById('dash-rent-legend');
  if (!canvas) return;

  // Build per-portfolio history series
  const series = ps.map(p => {
    const dates = [...new Set(p.assets.flatMap(a => (a.history||[]).map(h => h.date)))].sort();
    const points = dates.map(date => {
      let inv = 0, val = 0;
      p.assets.forEach(a => {
        const entry = [...(a.history||[])].reverse().find(h => h.date <= date);
        const price = entry ? entry.price : a.buyPrice;
        inv += a.quantity * a.buyPrice;
        val += a.quantity * price;
      });
      const pct = inv > 0 ? ((val - inv) / inv) * 100 : 0;
      return { date, pct };
    });
    return { name: p.name, color: p.color, points };
  }).filter(s => s.points.length >= 2);

  if (series.length === 0) {
    canvas.style.display = 'none';
    if (emptyEl) emptyEl.style.display = 'block';
    if (legendEl) legendEl.innerHTML = '';
    return;
  }
  canvas.style.display = '';
  if (emptyEl) emptyEl.style.display = 'none';

  // Legend
  if (legendEl) {
    legendEl.innerHTML = series.map(s => {
      const last = s.points[s.points.length-1]?.pct || 0;
      return `<div style="display:flex;align-items:center;gap:5px">
        <div style="width:12px;height:3px;border-radius:2px;background:${s.color}"></div>
        <span style="color:#94a3b8">${s.name}</span>
        <span style="color:${last>=0?'#10b981':'#ef4444'};font-weight:700">${last>=0?'+':''}${last.toFixed(1)}%</span>
      </div>`;
    }).join('');
  }

  const dpr = window.devicePixelRatio || 1;
  const w   = canvas.getBoundingClientRect().width || canvas.parentElement?.getBoundingClientRect().width || 320;
  const h   = 150;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Collect all pct values to find global min/max
  const allPcts = series.flatMap(s => s.points.map(p => p.pct));
  const minV = Math.min(...allPcts, 0);
  const maxV = Math.max(...allPcts, 0);
  const allDates = [...new Set(series.flatMap(s => s.points.map(p => p.date)))].sort();
  const pad = { t: 14, r: 10, b: 28, l: 46 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  const yScale = v => pad.t + ch - (((v - minV) / (maxV - minV || 1)) * ch);

  // Zero line
  const zeroY = yScale(0);
  ctx.beginPath(); ctx.setLineDash([4,4]); ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
  ctx.moveTo(pad.l, zeroY); ctx.lineTo(pad.l + cw, zeroY); ctx.stroke(); ctx.setLineDash([]);

  // Y axis labels
  ctx.fillStyle = '#475569'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
  [minV, 0, maxV].filter((v,i,a)=>a.indexOf(v)===i).forEach(v => {
    ctx.fillText((v>=0?'+':'')+v.toFixed(1)+'%', pad.l-5, yScale(v)+4);
  });

  // Draw each portfolio line
  series.forEach(s => {
    const n = s.points.length;
    const xStep = n > 1 ? cw / (n - 1) : cw;
    ctx.beginPath();
    s.points.forEach((pt, i) => {
      const x = pad.l + i * xStep;
      const y = yScale(pt.pct);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Dot at last point
    const lx = pad.l + (n-1)*xStep, ly = yScale(s.points[n-1].pct);
    ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI*2);
    ctx.fillStyle = s.color; ctx.fill();
  });

  // X axis labels from the longest series
  const longestSeries = series.reduce((a,b) => a.points.length >= b.points.length ? a : b);
  const pts = longestSeries.points;
  const xStep = pts.length > 1 ? cw / (pts.length-1) : cw;
  ctx.textAlign = 'center'; ctx.font = '9px DM Sans,sans-serif'; ctx.fillStyle = '#475569';
  const step = Math.max(1, Math.floor(pts.length / 4));
  pts.forEach((p, i) => {
    if (i % step === 0 || i === pts.length - 1) {
      ctx.fillText(p.date.slice(5), pad.l + i * xStep, h - 8);
    }
  });
}

function drawInvestmentByYear(ps) {
  const canvas  = document.getElementById('dash-invest-canvas');
  const emptyEl = document.getElementById('dash-invest-empty');
  const legendEl= document.getElementById('dash-invest-legend');
  if (!canvas) return;

  // Build year → portfolio → amount map
  const yearSet = new Set();
  const portfolioData = ps.map(p => {
    const byYear = {};
    p.assets.forEach(a => {
      if (a.purchases && a.purchases.length > 0) {
        a.purchases.forEach(pur => {
          const y = (pur.date || a.addedAt || '').slice(0,4) || '?';
          byYear[y] = (byYear[y]||0) + pur.qty * pur.price;
          yearSet.add(y);
        });
      } else {
        const y = (a.addedAt || '').slice(0,4) || '?';
        byYear[y] = (byYear[y]||0) + a.quantity * a.buyPrice;
        yearSet.add(y);
      }
    });
    return { name: p.name, color: p.color, byYear };
  });

  const years = [...yearSet].sort();
  const hasData = portfolioData.some(p => Object.keys(p.byYear).length > 0);

  if (!hasData || years.length === 0) {
    canvas.style.display = 'none';
    if (emptyEl) emptyEl.style.display = 'block';
    if (legendEl) legendEl.innerHTML = '';
    return;
  }
  canvas.style.display = '';
  if (emptyEl) emptyEl.style.display = 'none';

  // Legend
  if (legendEl) {
    legendEl.innerHTML = portfolioData.map(p => {
      const total = Object.values(p.byYear).reduce((s,v)=>s+v,0);
      return `<div style="display:flex;align-items:center;gap:5px">
        <div style="width:12px;height:12px;border-radius:3px;background:${p.color}"></div>
        <span style="color:#94a3b8">${p.name}</span>
        <span style="color:${p.color};font-weight:700">${fmt(total)}</span>
      </div>`;
    }).join('');
  }

  const dpr = window.devicePixelRatio || 1;
  const w   = canvas.getBoundingClientRect().width || canvas.parentElement?.getBoundingClientRect().width || 320;
  const h   = 180;
  canvas.width = w*dpr; canvas.height = h*dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const maxVal = Math.max(...years.map(y => portfolioData.reduce((s,p) => s+(p.byYear[y]||0), 0)), 1);
  const pad = { t:10, r:10, b:28, l:56 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;

  // Number of portfolios with data
  const nPort = portfolioData.length;
  const groupW = cw / years.length;
  const barW = Math.min(groupW / nPort * 0.72, 36);
  const groupPad = (groupW - barW * nPort) / 2;

  // Y axis guide lines
  [0, 0.5, 1].forEach(frac => {
    const val = maxVal * frac;
    const yPos = pad.t + ch - frac * ch;
    ctx.fillStyle = '#475569'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    let label = val >= 1e6 ? (val/1e6).toFixed(1)+'M' : val >= 1e3 ? (val/1e3).toFixed(0)+'k' : val.toFixed(0);
    ctx.fillText(label+'€', pad.l-6, yPos+4);
    ctx.beginPath(); ctx.setLineDash([3,3]); ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
    ctx.moveTo(pad.l, yPos); ctx.lineTo(pad.l+cw, yPos); ctx.stroke(); ctx.setLineDash([]);
  });

  // Draw bars — one per portfolio per year, side by side
  years.forEach((year, yi) => {
    const gx = pad.l + yi * groupW;
    portfolioData.forEach((p, pi) => {
      const val = p.byYear[year] || 0;
      if (val <= 0) return;
      const barH = (val / maxVal) * ch;
      const x = gx + groupPad + pi * barW;
      const y = pad.t + ch - barH;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(x, y, barW - 2, barH, [3,3,0,0]);
      else ctx.rect(x, y, barW - 2, barH);
      ctx.fill();
    });
    // Year label
    ctx.fillStyle = '#64748b'; ctx.font = '10px DM Sans,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(year, gx + groupW/2, h - 6);
  });
}

                  <div style="font-size:16px;font-weight:800;color:${pctColor(profit)};font-family:monospace">${fmt(profit)}</div>
                  <span class="badge" style="background:${pctColor(pct)}18;color:${pctColor(pct)}">${fmtPct(pct)}</span>
                </div>
              </div>
            </div>
          `;
        }).join('')
      }
    </div>
  `;

  // Draw pie chart
  if(portfolio.assets.length>0) {
    setTimeout(()=>drawPie(portfolio),50);
  }

  // Event delegation — evita problemas de CSP con onclick inline
  document.getElementById('screen').addEventListener('click', function handler(e) {
    // Botón eliminar
    const delBtn = e.target.closest('.del-asset-btn');
    if (delBtn) {
      e.stopPropagation();
      deleteAsset(delBtn.dataset.delPortfolio, delBtn.dataset.delAsset);
      return;
    }
    // Click en tarjeta de activo → abrir modal edición completa
    const card = e.target.closest('.asset-card-clickable');
    if (card) {
      showEditAsset(card.dataset.assetId);
    }
  }, { once: true });
}

function drawPie(portfolio) {
  const canvas = document.getElementById('pie-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const total = portfolio.assets.reduce((s,a)=>s+a.quantity*a.currentPrice,0);
  const data = portfolio.assets.map((a,i)=>({label:a.ticker||a.name,value:a.quantity*a.currentPrice,color:UCOLORS[i%UCOLORS.length],pct:(a.quantity*a.currentPrice/total*100).toFixed(1)}));
  const cx=150,cy=80,r=70,ir=40;
  ctx.clearRect(0,0,300,160);
  let angle=-Math.PI/2;
  data.forEach(d=>{
    const slice=(d.value/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.fillStyle=d.color;ctx.fill();
    angle+=slice;
  });
  ctx.beginPath();ctx.arc(cx,cy,ir,0,Math.PI*2);ctx.fillStyle='#111827';ctx.fill();
  // Legend
  const legend = document.getElementById('pie-legend');
  if(legend) legend.innerHTML=data.map(d=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8"><div style="width:8px;height:8px;border-radius:50%;background:${d.color}"></div>${d.label} ${d.pct}%</div>`).join('');
}

function updateAsset(assetId, changes, addHistory = false) {
  const today = new Date().toISOString().split('T')[0];
  state.portfolios = state.portfolios.map(p => {
    if (p.id !== state.activeId) return p;
    return {
      ...p, assets: p.assets.map(a => {
        if (a.id !== assetId) return a;
        const updated = { ...a, ...changes };
        if (addHistory && changes.currentPrice !== undefined) {
          const hist = [...(a.history || [])];
          const last = hist[hist.length - 1];
          if (!last || last.date !== today) hist.push({ date: today, price: changes.currentPrice });
          else hist[hist.length - 1] = { date: today, price: changes.currentPrice };
          updated.history = hist;
        }
        return updated;
      })
    };
  });
  saveData();
  closeModal();
  renderPortfolio();
}

function deleteAsset(portfolioId, assetId) {
  if(!confirm('¿Eliminar este activo?')) return;
  state.portfolios = state.portfolios.map(p=>p.id!==portfolioId?p:{...p,assets:p.assets.filter(a=>a.id!==assetId)});
  saveData();
  toast('Activo eliminado','err');
  renderPortfolio();
}

function renderHistory() {
  const portfolio = state.portfolios.find(p=>p.id===state.activeId);
  if(!portfolio){document.getElementById('screen').innerHTML='<div class="empty" style="padding-top:60px">Selecciona una cartera primero</div>';return;}

  const allHistory = portfolio.assets.flatMap(a=>
    (a.history||[]).map(h=>({date:h.date,asset:a.name,ticker:a.ticker,price:h.price,pct:((h.price-a.buyPrice)/a.buyPrice)*100,value:a.quantity*h.price}))
  ).sort((a,b)=>b.date.localeCompare(a.date));

  // Build portfolio value history
  const allDates=[...new Set(portfolio.assets.flatMap(a=>(a.history||[]).map(h=>h.date)))].sort();
  const histData=allDates.map(date=>{
    const value=portfolio.assets.reduce((s,a)=>{
      const entry=[...(a.history||[])].reverse().find(h=>h.date<=date);
      return s+(entry?entry.price*a.quantity:a.quantity*a.buyPrice);
    },0);
    return {date,value};
  });

  document.getElementById('screen').innerHTML=`
    <div class="header safe-top">
      <div>
        <h1 style="font-size:20px">Historial</h1>
        <p style="font-size:11px;color:#64748b;margin-top:2px">${portfolio.name}</p>
      </div>
    </div>
    ${renderUserTabs()}

    ${histData.length>1?`
    <div class="card">
      <div class="section-title">VALOR DE CARTERA</div>
      <canvas id="hist-canvas" width="340" height="150" style="width:100%;height:150px"></canvas>
    </div>`:''}

    <div class="card">
      <div class="section-title">REGISTRO DE PRECIOS</div>
      ${allHistory.length===0?'<div class="empty">Sin historial. Se registra al actualizar precios.</div>':
        allHistory.map(h=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #0f172a">
            <div>
              <div style="font-size:13px;font-weight:700">${h.asset} <span style="color:#475569;font-size:11px">${h.ticker||''}</span></div>
              <div style="font-size:11px;color:#64748b;font-family:monospace">${h.date}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:14px;font-weight:700;font-family:monospace">${fmt(h.price)}</div>
              <span style="color:${pctColor(h.pct)};font-size:12px;font-weight:700">${fmtPct(h.pct)}</span>
            </div>

function drawLineChart(canvasId, data, color) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const dpr = window.devicePixelRatio||1;
  const w=canvas.offsetWidth, h=150;
  canvas.width=w*dpr; canvas.height=h*dpr;
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const values=data.map(d=>d.value);
  const min=Math.min(...values),max=Math.max(...values);
  const pad={t:10,r:10,b:30,l:55};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const xStep=cw/(data.length-1);
  const yScale=v=>pad.t+ch-(((v-min)/(max-min||1))*ch);
  // Gradient fill
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,color+'55'); grad.addColorStop(1,color+'00');
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x=pad.l+i*xStep, y=yScale(d.value);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.l+(data.length-1)*xStep,pad.t+ch);
  ctx.lineTo(pad.l,pad.t+ch);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  // Line
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x=pad.l+i*xStep, y=yScale(d.value);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.stroke();
  // Y axis labels
  ctx.fillStyle='#475569'; ctx.font='10px monospace'; ctx.textAlign='right';
  [min,max].forEach(v=>ctx.fillText('€'+(v/1000).toFixed(0)+'k',pad.l-6,yScale(v)+4));
  // X axis labels
  ctx.textAlign='center'; ctx.font='9px DM Sans,sans-serif';
  const step=Math.max(1,Math.floor(data.length/4));
  data.forEach((d,i)=>{ if(i%step===0) ctx.fillText(d.date.slice(5),pad.l+i*xStep,h-8); });
}

// ── COMPARE ──
function renderCompare() {
  const ps = state.portfolios;
  document.getElementById('screen').innerHTML=`
    <div class="header safe-top">
      <h1 style="font-size:20px">Comparar</h1>
    </div>
    ${renderUserTabs()}
    ${ps.length<2?`
      <div class="card" style="text-align:center;padding:50px 20px">
        <div style="font-size:48px;margin-bottom:14px">👥</div>
        <p style="color:#64748b;margin-bottom:8px">Necesitas al menos 2 carteras</p>
        <p style="font-size:13px;color:#475569">Pulsa <strong style="color:#00d4ff">"+ Nueva"</strong> arriba para añadir otra cartera</p>
      </div>
    `:`
      ${ps.map((p,i)=>{
        const st=calcStats(p.assets);
        const rank=ps.map(pp=>({id:pp.id,pct:calcStats(pp.assets).pct})).sort((a,b)=>b.pct-a.pct).findIndex(x=>x.id===p.id);
        return `
          <div class="card" style="border-color:${p.color}40;position:relative;overflow:hidden">
            ${rank===0?`<div style="position:absolute;top:0;right:0;background:${p.color};color:#080c14;font-size:10px;font-weight:800;padding:3px 12px;border-bottom-left-radius:8px">👑 GANADOR</div>`:''}
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
              <div style="width:10px;height:10px;border-radius:50%;background:${p.color}"></div>
              <span style="font-size:16px;font-weight:800">${p.name}</span>
              <span style="font-size:20px;font-weight:900;margin-left:auto;color:#1e293b">#${rank+1}</span>
            </div>
            <div style="font-size:36px;font-weight:900;color:${pctColor(st.pct)};font-family:monospace;margin-bottom:8px">${fmtPct(st.pct)}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;color:#64748b">
              <div>Valor: <span style="color:#94a3b8;font-weight:700">${fmt(st.current)}</span></div>
              <div>P&G: <span style="color:${pctColor(st.profit)};font-weight:700">${fmt(st.profit)}</span></div>
              <div>Invertido: <span style="color:#94a3b8;font-weight:700">${fmt(st.invested)}</span></div>
              <div>Activos: <span style="color:#94a3b8;font-weight:700">${p.assets.length}</span></div>
            </div>
          </div>
        `;
      }).join('')}

      <div class="card">
        <div class="section-title">COMPARATIVA DIRECTA</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="border-bottom:1px solid #1e293b">
            ${['Cartera','Invertido','Valor','Rent.'].map(h=>`<th style="padding:8px 4px;text-align:left;color:#64748b;font-size:10px;font-weight:700">${h}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${ps.sort((a,b)=>calcStats(b.assets).pct-calcStats(a.assets).pct).map(p=>{
              const st=calcStats(p.assets);
              return `<tr style="border-bottom:1px solid #0f172a">
                <td style="padding:10px 4px;font-weight:700;display:flex;align-items:center;gap:6px">
                  <div style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0"></div>${p.name}
                </td>
                <td style="padding:10px 4px;font-family:monospace;color:#64748b">${fmt(st.invested)}</td>
                <td style="padding:10px 4px;font-family:monospace;font-weight:700">${fmt(st.current)}</td>
                <td style="padding:10px 4px"><span class="badge" style="background:${pctColor(st.pct)}18;color:${pctColor(st.pct)}">${fmtPct(st.pct)}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `}
  `;
}

// ── ADD USER ──
function showAddUser() {
  showModal(`
    <h3 style="font-size:17px;font-weight:800;margin-bottom:18px">👤 Nueva Cartera</h3>
    <label style="font-size:11px;color:#64748b;font-weight:700;display:block;margin-bottom:8px">NOMBRE DEL INVERSOR</label>

    <div style="display:flex;gap:10px;margin-top:16px">

function addUser() {
  const name = document.getElementById('new-user-inp')?.value?.trim();
  if(!name) return;
  const p = {id:Date.now().toString(), name, color:UCOLORS[state.portfolios.length%UCOLORS.length], assets:[]};
  state.portfolios = [...state.portfolios, p];
  state.activeId = p.id;
  saveData();
  closeModal();
  toast(`Cartera "${name}" creada`);
  setView('portfolio');
}

// ── EDIT / DELETE PORTFOLIO ──
function showEditPortfolio(id) {
  const p = state.portfolios.find(x => x.id === id);
  if (!p) return;
  showModal(`
    <h3 style="font-size:17px;font-weight:800;margin-bottom:6px">✏️ Editar Cartera</h3>
    <p style="font-size:12px;color:#64748b;margin-bottom:18px">${p.assets.length} activos</p>

    <label style="font-size:11px;color:#64748b;font-weight:700;display:block;margin-bottom:6px">NOMBRE</label>
    <input id="edit-portfolio-name" type="text" class="inp" value="${p.name}" style="font-size:16px;margin-bottom:18px"/>

    <label style="font-size:11px;color:#64748b;font-weight:700;display:block;margin-bottom:8px">COLOR</label>
    <div style="display:flex;gap:10px;margin-bottom:20px">
      ${['#00d4ff','#ff6b35','#a78bfa','#10b981','#f59e0b','#f472b6'].map(c=>`
        <div onclick="document.querySelectorAll('.color-opt').forEach(x=>x.style.outline='none');this.style.outline='3px solid #fff';document.getElementById('edit-portfolio-color').value='${c}'"
          class="color-opt"
          style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;outline:${p.color===c?'3px solid #fff':'none'};outline-offset:2px">
        </div>`).join('')}
    </div>
    <input type="hidden" id="edit-portfolio-color" value="${p.color}"/>

    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn-primary" onclick="saveEditPortfolio('${id}')">💾 Guardar</button>
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid #1e293b">
      <button onclick="confirmDeletePortfolio('${id}')" style="background:none;border:1px solid #ef444440;color:#ef4444;font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif">
        🗑️ Eliminar esta cartera
      </button>
    </div>
  `, () => document.getElementById('edit-portfolio-name')?.focus());
}

function saveEditPortfolio(id) {
  const name = document.getElementById('edit-portfolio-name')?.value?.trim();
  const color = document.getElementById('edit-portfolio-color')?.value;
  if (!name) return;
  state.portfolios = state.portfolios.map(p => p.id === id ? {...p, name, color} : p);
  saveData();
  closeModal();
  toast(`Cartera actualizada`);
  render();
}

function confirmDeletePortfolio(id) {
  const p = state.portfolios.find(x => x.id === id);
  if (!p) return;
  showModal(`
    <h3 style="font-size:17px;font-weight:800;margin-bottom:12px">🗑️ Eliminar Cartera</h3>
    <p style="font-size:14px;color:#94a3b8;margin-bottom:6px">¿Seguro que quieres eliminar</p>
    <p style="font-size:16px;font-weight:800;color:#ef4444;margin-bottom:6px">"${p.name}"</p>
    <p style="font-size:13px;color:#64748b;margin-bottom:24px">Se borrarán los ${p.assets.length} activos que contiene. Esta acción no se puede deshacer.</p>
    <div style="display:flex;gap:10px">
      <button onclick="deletePortfolio('${id}')" style="flex:1;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-weight:800;padding:12px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif">Sí, eliminar</button>
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}

function deletePortfolio(id) {
  const p = state.portfolios.find(x => x.id === id);
  state.portfolios = state.portfolios.filter(x => x.id !== id);
  state.activeId = state.portfolios[0]?.id || null;
  saveData();
  closeModal();
  toast(`Cartera "${p?.name}" eliminada`, 'err');
  setView('dashboard');
}

// ── ADD ASSET ──

  showModal(`
    <h3 style="font-size:17px;font-weight:800;margin-bottom:18px">➕ Añadir Activo</h3>
    <div style="display:flex;flex-direction:column;gap:12px">

        <label style="font-size:10px;color:#64748b;font-weight:700;display:block;margin-bottom:6px">TICKER o ISIN *</label>
        <div style="position:relative">
          <input id="f-ticker" type="text" class="inp" placeholder="AAPL · BTC · ES0173516117" style="text-transform:uppercase;padding-right:40px" oninput="this.value=this.value.toUpperCase()"/>
          <span id="ticker-spin" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);display:none;animation:spin 1s linear infinite">⏳</span>
        </div>
        <div id="ticker-hint" style="font-size:10px;color:#64748b;margin-top:5px;line-height:1.5">
          Ticker: <b>AAPL</b>, <b>BTC</b>, <b>VWCE.DE</b> &nbsp;·&nbsp; ISIN: <b>IE00B3XXRP09</b>
        </div>
        <div id="id-type-badge" style="display:none;margin-top:5px"></div>
      </div>

      <div>
        <label style="font-size:10px;color:#64748b;font-weight:700;display:block;margin-bottom:6px">NOMBRE *</label>
        <input id="f-name" type="text" class="inp" placeholder="Se autocompleta al buscar..."/>
      </div>

      <div>
        <label style="font-size:10px;color:#64748b;font-weight:700;display:block;margin-bottom:6px">Nº PARTICIPACIONES *</label>
        <input id="f-qty" type="number" class="inp" placeholder="10" inputmode="decimal"/>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label style="font-size:10px;color:#64748b;font-weight:700;display:block;margin-bottom:6px">PRECIO COMPRA (€) *</label>
          <input id="f-buy" type="number" class="inp" placeholder="150.00" inputmode="decimal"/>
        </div>
        <div>
          <label style="font-size:10px;color:#64748b;font-weight:700;display:block;margin-bottom:6px">PRECIO ACTUAL (€)</label>
          <div style="position:relative">
            <input id="f-cur" type="number" class="inp" placeholder="Auto 🔄" inputmode="decimal"/>
            <div id="price-badge" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:#10b98122;color:#10b981;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px">LIVE</div>
          </div>
        </div>
      </div>

      <div>
        <label style="font-size:10px;color:#64748b;font-weight:700;display:block;margin-bottom:6px">📅 FECHA DE COMPRA *</label>
        <input id="f-date" type="date" class="inp" value="${new Date().toISOString().slice(0,10)}" style="color:#e2e8f0"/>
      </div>

      <button id="btn-buscar-ticker" style="background:#0f172a;border:1.5px solid #00d4ff40;color:#00d4ff;padding:12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">
        🔍 Buscar cotización
      </button>

      <div style="display:flex;gap:10px;margin-top:4px">
        <button id="btn-add-asset-confirm" class="btn-primary">Añadir Activo</button>
        <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  `);

  document.getElementById('btn-buscar-ticker').addEventListener('click', autoFetchPrice);
  document.getElementById('f-ticker').addEventListener('keydown', e => { if (e.key === 'Enter') autoFetchPrice(); });
  document.getElementById('f-ticker').addEventListener('input', () => {
    // Limpia nombre y precio al cambiar el ticker para que se autocomplete de nuevo
    const nameInp = document.getElementById('f-name');
    const curInp = document.getElementById('f-cur');
    const badge = document.getElementById('price-badge');
    const hint = document.getElementById('ticker-hint');
    const typeBadge = document.getElementById('id-type-badge');
    if (nameInp) nameInp.value = '';
    if (curInp) curInp.value = '';
    if (badge) badge.style.display = 'none';
    if (hint) { hint.textContent = 'Ticker: AAPL, BTC, VWCE.DE · ISIN: IE00B3XXRP09'; hint.style.color = '#64748b'; }
    if (typeBadge) typeBadge.style.display = 'none';
  });
  document.getElementById('btn-add-asset-confirm').addEventListener('click', addAsset);
  document.getElementById('f-name').focus();
}

async function autoFetchPrice() {
  const id = document.getElementById('f-ticker')?.value?.trim().toUpperCase();
  if (!id) return;
  const spin = document.getElementById('ticker-spin');
  const hint = document.getElementById('ticker-hint');
  const badge = document.getElementById('price-badge');
  const typeBadge = document.getElementById('id-type-badge');
  const curInp = document.getElementById('f-cur');
  const nameInp = document.getElementById('f-name');
  const btn = document.getElementById('btn-buscar-ticker');

  const type = detectIdType(id);
  const typeLabels = { isin: '🏦 ISIN detectado', crypto: '₿ Crypto', ticker: '📈 Ticker' };
  const typeColors = { isin: '#a78bfa', crypto: '#f59e0b', ticker: '#00d4ff' };

  if (typeBadge) {
    typeBadge.style.display = 'inline-block';
    typeBadge.innerHTML = `<span style="background:${typeColors[type]}18;color:${typeColors[type]};font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px">${typeLabels[type]}</span>`;
    if (type === 'isin') {
      typeBadge.innerHTML += ` <span style="font-size:10px;color:#64748b;margin-left:4px">Resolviendo mediante OpenFIGI...</span>`;
    }
  }

  if (spin) spin.style.display = 'inline-block';
  if (btn) { btn.textContent = '⏳ Buscando...'; btn.disabled = true; }
  if (hint) hint.textContent = type === 'isin' ? 'Consultando OpenFIGI + Yahoo Finance...' : 'Consultando Yahoo Finance...';

  const result = await fetchPriceEUR(id);

  if (spin) spin.style.display = 'none';
  if (btn) { btn.textContent = '🔍 Buscar cotización'; btn.disabled = false; }

  if (result !== null) {
    const price = typeof result === 'object' ? result.price : result;
    if (curInp) curInp.value = price.toFixed(4);
    if (badge) badge.style.display = 'block';
    // Autocompleta nombre si vino nombre y el campo está vacío
    if (nameInp && result.resolvedName && !nameInp.value.trim()) {
      nameInp.value = result.resolvedName;
    }
    const resolvedInfo = result.resolvedTicker ? ` → ${result.resolvedTicker}` : '';
    if (hint) { hint.textContent = `✅ ${fmt(price)}${resolvedInfo}`; hint.style.color = '#10b981'; }
    if (typeBadge && type === 'isin') {
      typeBadge.innerHTML = `<span style="background:#10b98118;color:#10b981;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px">✅ ISIN resuelto${resolvedInfo}</span>`;
    }
  } else {
    if (hint) { hint.textContent = type === 'isin' ? '⚠️ ISIN no encontrado en OpenFIGI. Introduce el precio manualmente.' : '⚠️ No encontrado. Prueba con otro ticker o introduce precio manualmente.'; hint.style.color = '#f59e0b'; }
  }
}

function addAsset() {
  const name=document.getElementById('f-name')?.value?.trim();
  const ticker=document.getElementById('f-ticker')?.value?.trim().toUpperCase();
  const qty=parseFloat(document.getElementById('f-qty')?.value);
  const buy=parseFloat(document.getElementById('f-buy')?.value);
  const dateVal=document.getElementById('f-date')?.value;
  let cur=parseFloat(document.getElementById('f-cur')?.value);
  if(!name||isNaN(qty)||isNaN(buy)){toast('Rellena los campos obligatorios *','err');return;}
  if(isNaN(cur)) cur = buy;
  const buyDate = dateVal || new Date().toISOString().slice(0,10);
  const a={
    id:Date.now().toString(),
    name,ticker,quantity:qty,buyPrice:buy,currentPrice:cur,
    addedAt:buyDate,
    purchases:[{date:buyDate, qty, price:buy}],
    history:[{date:buyDate,price:buy}]
  };
  state.portfolios=state.portfolios.map(p=>p.id!==state.activeId?p:{...p,assets:[...p.assets,a]});
  saveData();
  closeModal();
  toast(`${name} añadido ✓`);
  if (ticker) setTimeout(() => refreshAllPrices(true), 500);
  renderPortfolio();
}
